    </div>
    <div style="flex:1;min-width:120px;background:var(--surface);border-radius:4px;height:20px;overflow:hidden">
      <div style="height:100%;width:${Math.min(100,state.xp/10)}%;background:linear-gradient(90deg,var(--green),var(--gold));transition:width .3s"></div>
    </div>
    ${state.xp >= 1000 ? `<button class="btn btn-primary" style="padding:8px 20px;font-size:1em;animation:pulse 1s infinite" onclick="levelUp()">레벨업!</button>` : ''}
  </div>`;

  html += '<div class="dash-grid">';

  // HP Tracker
  html += `<div class="dash-block">
    <h3>HP 추적</h3>
    <div class="hp-display">
      <span class="hp-big" id="currentHPDisplay">${state.currentHP}</span>
      <span class="hp-sep">/</span>
      <span class="hp-max">${maxHP}</span>
    </div>
    <div class="hp-controls" style="margin-bottom:10px">
      <button class="hp-minus" onclick="changeHP(-1)">-1</button>
      <button class="hp-minus" onclick="changeHP(-5)">-5</button>
      <input type="number" id="hpChangeAmt" value="1" min="1" style="width:50px">
      <button class="hp-minus" onclick="changeHP(-parseInt(document.getElementById('hpChangeAmt').value)||0)">-N</button>
      <button class="hp-plus" onclick="changeHP(parseInt(document.getElementById('hpChangeAmt').value)||0)">+N</button>
      <button class="hp-plus" onclick="changeHP(5)">+5</button>
      <button class="hp-plus" onclick="changeHP(1)">+1</button>
    </div>
    <div style="display:flex;gap:15px;font-size:.85em;flex-wrap:wrap">
      <div>임시 HP: <input type="number" value="${state.tempHP}" min="0" style="width:50px;padding:2px 6px" onchange="state.tempHP=parseInt(this.value)||0"></div>
      <div>죽어감: <button class="btn" style="padding:1px 8px;font-size:.8em;background:var(--accent)" onclick="changeDying(-1)">-</button> <span style="color:var(--accent);font-weight:bold">${state.dying}</span> <button class="btn" style="padding:1px 8px;font-size:.8em;background:var(--accent)" onclick="changeDying(1)">+</button></div>
      <div>부상: <button class="btn" style="padding:1px 8px;font-size:.8em;background:var(--accent2)" onclick="changeWounded(-1)">-</button> <span style="color:var(--accent2);font-weight:bold">${state.wounded}</span> <button class="btn" style="padding:1px 8px;font-size:.8em;background:var(--accent2)" onclick="changeWounded(1)">+</button></div>
      <div><button class="btn btn-primary" style="padding:2px 12px;font-size:.8em" onclick="fullHeal()">완전 회복</button></div>
    </div>
  </div>`;

  // Combat Stats
  html += `<div class="dash-block">
    <h3>전투 능력치</h3>`;
  const acVal = getAC();
  const armorData = getEquippedArmorData();
  const armorName = armorData ? armorData.name : '비장갑';
  html += `<div class="combat-stat-row"><span class="cs-label">AC (${armorName})</span><span class="cs-val">${acVal}</span></div>`;
  html += `<div class="combat-stat-row"><span class="cs-label">이동 속도</span><span class="cs-val">${getSpeed()}피트</span></div>`;
  html += `<div class="combat-stat-row"><span class="cs-label">감지</span><span class="cs-val">${cls?`${a.wis>=0?'+':''}${a.wis + getProfBonus(cls.perception)}`:'-'}</span></div>`;
  if(cls){
    const fortSave = a.con + getProfBonus(cls.saves.fort);
    const refSave = a.dex + getProfBonus(cls.saves.ref);
    const willSave = a.wis + getProfBonus(cls.saves.will);
    html += `<div class="combat-stat-row"><span class="cs-label">인내 내성 (${cls.saves.fort==='E'?'전문가':'숙련'})</span><span class="cs-val">${fortSave>=0?'+':''}${fortSave}</span></div>`;
    html += `<div class="combat-stat-row"><span class="cs-label">반사 내성 (${cls.saves.ref==='E'?'전문가':'숙련'})</span><span class="cs-val">${refSave>=0?'+':''}${refSave}</span></div>`;
    html += `<div class="combat-stat-row"><span class="cs-label">의지 내성 (${cls.saves.will==='E'?'전문가':'숙련'})</span><span class="cs-val">${willSave>=0?'+':''}${willSave}</span></div>`;
    // Attack bonus (rough: str/dex + proficiency)
    const atkAttr = (cls.key==='dex') ? a.dex : a.str;
    const atkProf = (state.class_==='fighter') ? getProfBonus('E') : getProfBonus('T');
    html += `<div class="combat-stat-row"><span class="cs-label">근접 공격 (${state.class_==='fighter'?'전문가':'숙련'})</span><span class="cs-val">${(atkAttr+atkProf)>=0?'+':''}${atkAttr+atkProf}</span></div>`;
  }
  html += `<div class="combat-stat-row"><span class="cs-label">감각</span><span class="cs-val">${anc?anc.vision:'—'}</span></div>`;
  html += `<div class="combat-stat-row"><span class="cs-label">크기</span><span class="cs-val">${anc?anc.size:'—'}</span></div>`;
  html += `</div>`;

  // Action Economy
  html += `<div class="dash-block">
    <h3>행동 경제 (턴당 3행동)</h3>
    <div class="action-display">
      ${[1,2,3].map(i=>`<div class="action-circle ${state.actionsUsed>=i?'used':''}" onclick="toggleAction(${i})" title="${i}번째 행동">&#9670;</div>`).join('')}
      <button class="btn btn-secondary" style="margin-left:15px;padding:4px 12px;font-size:.85em" onclick="resetActions()">턴 초기화</button>
    </div>
    <div style="margin-top:10px;font-size:.85em;color:var(--text2)">
      사용: ${state.actionsUsed}/3 | 남은: ${3 - state.actionsUsed}행동
      ${state.conditions['가속된']?' | <span style="color:var(--green)">+1 가속 행동</span>':''}
      ${state.conditions['느려진']?` | <span style="color:var(--accent)">-${state.conditions['느려진']} 느려짐</span>`:''}
    </div>
  </div>`;

  // Conditions Panel
  html += `<div class="dash-block">
    <h3>상태 이상</h3>
    <div class="condition-grid">`;
  CONDITIONS_LIST.forEach(cond=>{
    const active = state.conditions[cond.name];
    if(cond.hasValue){
      const val = active || 0;
      html += `<span class="cond-btn ${val>0?'active':''}" onclick="toggleCondition('${cond.name}',${cond.hasValue},${cond.max})" oncontextmenu="event.preventDefault();showConditionInfo('${cond.name}')">
        ${cond.name}${val>0?`<span class="cond-val">${val}</span>`:''}
        <span class="cond-info-btn" onclick="event.stopPropagation();showConditionInfo('${cond.name}')">?</span>
      </span>`;
    } else {
      html += `<span class="cond-btn ${active?'active':''}" onclick="toggleCondition('${cond.name}',false,0)" oncontextmenu="event.preventDefault();showConditionInfo('${cond.name}')">
        ${cond.name}
        <span class="cond-info-btn" onclick="event.stopPropagation();showConditionInfo('${cond.name}')">?</span>
      </span>`;
    }
  });
  html += `</div>`;
  // Active conditions detail panel
  const activeCondNames = Object.keys(state.conditions).filter(k=>state.conditions[k]);
  if(activeCondNames.length > 0){
    html += `<div style="margin-top:10px;background:var(--surface);border-radius:6px;padding:10px;font-size:.85em">
      <div style="color:var(--gold);font-weight:bold;margin-bottom:6px">활성 상태 상세</div>`;
    activeCondNames.forEach(name=>{
      const cd = CONDITIONS_DATA[name];
      if(cd){
        const val = state.conditions[name];
        html += `<div style="margin-bottom:6px;padding:4px 8px;border-left:3px solid var(--accent);background:rgba(233,69,96,.05)">
          <strong style="color:var(--accent)">${name}${typeof val==='number'&&val>1?' '+val:''}</strong>
          <div style="color:var(--text2);margin-top:2px">${cd.desc}</div>
        </div>`;
      }
    });
    html += `</div>`;
  }
  // Condition info panel (shown via right-click or showConditionInfo)
  html += `<div id="condInfoPanel" style="display:none;margin-top:10px;background:var(--surface);border-radius:6px;padding:10px;font-size:.85em;border:1px solid var(--accent)">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <strong id="condInfoName" style="color:var(--gold)"></strong>
      <span style="cursor:pointer;color:var(--text2)" onclick="document.getElementById('condInfoPanel').style.display='none'">[닫기]</span>
    </div>
    <div id="condInfoDesc" style="color:var(--text2);margin-top:4px"></div>
  </div>`;
  html += `</div>`;

  // Spell Slots (if caster)
  if(isSpellcaster()){
    html += `<div class="dash-block">
      <h3>주문 슬롯</h3>`;
    // Cantrips (unlimited)
    html += `<div style="margin-bottom:8px"><strong style="color:var(--green)">캔트립 (무제한)</strong></div>`;
    if(state.selectedCantrips.length > 0){
      html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">';
      state.selectedCantrips.forEach(sp=>{
        const data = CANTRIPS.find(c=>c.en===sp);
        html += `<span class="stat" style="background:rgba(78,204,163,.15);color:var(--green);cursor:pointer" onclick="showSpellInfo('cantrip','${sp.replace(/'/g,"\\'")}')" title="${data&&data.fullDesc?data.fullDesc:''}">${data?data.name:sp}</span>`;
      });
      html += '</div>';
      html += `<div id="cantripInfoPanel" style="display:none;margin-bottom:10px;padding:8px;background:var(--surface);border-radius:4px;font-size:.85em;border-left:3px solid var(--green)">
        <div style="display:flex;justify-content:space-between"><strong id="cantripInfoName" style="color:var(--green)"></strong><span style="cursor:pointer;color:var(--text2)" onclick="document.getElementById('cantripInfoPanel').style.display='none'">[닫기]</span></div>
        <div id="cantripInfoDesc" style="color:var(--text2);margin-top:4px"></div>
      </div>`;
    }
    // 1st rank slots
    const slotCount = cls ? cls.spellSlots : 0;
    html += `<div style="margin-bottom:8px"><strong style="color:var(--gold)">1등급 (${slotCount}슬롯)</strong></div>`;
    for(let i=0;i<slotCount;i++){
      const used = state.spellSlotsUsed.includes(i);
      const spellEn = state.selectedSpells[i];
      const spellData = spellEn ? RANK1_SPELLS.find(s=>s.en===spellEn) : null;
      const spellName = spellData ? spellData.name : (spellEn || '(비어있음)');
      html += `<div class="slot-row">
        <input type="checkbox" class="slot-check" ${used?'checked':''} onchange="toggleSpellSlot(${i})">
        <label style="${used?'text-decoration:line-through;opacity:.5':'cursor:pointer'}" ${spellData?`onclick="showSpellInfo('rank1','${spellEn.replace(/'/g,"\\'")}')" title="${spellData.fullDesc||spellData.desc}"`:''}>
          ${spellName}
        </label>
      </div>`;
    }
    html += `<div id="spellInfoPanel" style="display:none;margin-top:8px;padding:8px;background:var(--surface);border-radius:4px;font-size:.85em;border-left:3px solid var(--gold)">
      <div style="display:flex;justify-content:space-between"><strong id="spellInfoName" style="color:var(--gold)"></strong><span style="cursor:pointer;color:var(--text2)" onclick="document.getElementById('spellInfoPanel').style.display='none'">[닫기]</span></div>
      <div id="spellInfoDesc" style="color:var(--text2);margin-top:4px"></div>
    </div>`;
    html += `<button class="btn btn-secondary" style="margin-top:8px;padding:3px 10px;font-size:.8em" onclick="resetSpellSlots()">슬롯 초기화</button>`;
    html += `</div>`;
  }

  // Inventory Panel
  html += `<div class="dash-block${isSpellcaster()?'':' full'}">
    <h3>장비 목록 (${getTotalBulk()} Bulk)</h3>`;
  if(state.inventory.length === 0){
    html += '<p style="color:var(--text2);font-size:.85em">장비가 없습니다.</p>';
  } else {
    state.inventory.forEach((item,idx)=>{
      const slotState = state.inventorySlots[idx] || 'stowed';
      let label = item.name;
      if(item.qty > 1) label += ` x${item.qty}`;
      const itemDesc = item.desc || '';
      html += `<div style="padding:4px 0;border-bottom:1px solid var(--border);font-size:.85em" title="${itemDesc}">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="cursor:pointer" onclick="toggleItemDesc(${idx})">${label} <span style="color:var(--text2)">(${item.bulk}B)</span></span>
          <span style="display:flex;gap:3px">
            <span class="inv-slot-label ${slotState==='held'?'active-slot':''}" onclick="setItemSlot(${idx},'held')">손</span>
            <span class="inv-slot-label ${slotState==='worn'?'active-slot':''}" onclick="setItemSlot(${idx},'worn')">착용</span>
            <span class="inv-slot-label ${slotState==='stowed'?'active-slot':''}" onclick="setItemSlot(${idx},'stowed')">수납</span>
          </span>
        </div>
        ${itemDesc?`<div id="itemDesc${idx}" style="display:none;color:var(--text2);font-size:.8em;margin-top:2px;padding:2px 6px;border-left:2px solid var(--accent2)">${itemDesc}</div>`:''}
      </div>`;
    });
  }
  html += `</div>`;

  // Class Features Panel
  if(state.class_){
    const clsKey = state.class_;
    const advData = CLASS_ADVANCEMENT[clsKey];
    html += `<div class="dash-block full">
      <h3>클래스 특징 (${CLASSES[clsKey].name} Lv.${state.level})</h3>`;

    // Current level features
    const currentFeatures = advData[state.level] || [];
    if(currentFeatures.length > 0){
      html += `<div style="margin-bottom:10px">
        <div style="color:var(--green);font-weight:bold;margin-bottom:6px">현재 레벨 (${state.level}) 획득 특징</div>`;
      currentFeatures.forEach(feat=>{
        const desc = CLASS_FEATURE_DESC[feat] || '';
        html += `<div style="margin-bottom:6px;padding:6px 10px;background:rgba(78,204,163,.08);border-radius:4px;border-left:3px solid var(--green)">
          <strong style="color:var(--gold)">${feat}</strong>
          ${desc ? `<div style="color:var(--text2);font-size:.85em;margin-top:2px">${desc}</div>` : ''}
        </div>`;
      });
      html += `</div>`;
    }

    // All accumulated features up to current level
    html += `<div style="margin-bottom:10px">
      <div style="color:var(--gold);font-weight:bold;margin-bottom:6px;cursor:pointer" onclick="document.getElementById('allFeaturesPanel').style.display=document.getElementById('allFeaturesPanel').style.display==='none'?'block':'none'">
        [펼치기/접기] 전체 발전표 (1~10 레벨)
      </div>
      <div id="allFeaturesPanel" style="display:none">
        <table style="width:100%;border-collapse:collapse;font-size:.85em">
          <thead><tr>
            <th style="padding:4px 8px;text-align:left;background:var(--surface);color:var(--gold);border-bottom:1px solid var(--border)">레벨</th>
            <th style="padding:4px 8px;text-align:left;background:var(--surface);color:var(--gold);border-bottom:1px solid var(--border)">획득 특징</th>
          </tr></thead><tbody>`;
    for(let lv=1; lv<=10; lv++){
      const feats = advData[lv] || [];
      const isCurrent = lv === state.level;
      const isPast = lv < state.level;
      html += `<tr style="background:${isCurrent?'rgba(240,192,64,.1)':isPast?'rgba(78,204,163,.05)':'transparent'}">
        <td style="padding:4px 8px;border-bottom:1px solid var(--border);font-weight:${isCurrent?'bold':'normal'};color:${isCurrent?'var(--gold)':isPast?'var(--green)':'var(--text2)'}">
          ${lv} ${isCurrent?'(현재)':''}${lv > state.level ? '' : ''}
        </td>
        <td style="padding:4px 8px;border-bottom:1px solid var(--border)">
          ${feats.map(f=>`<span style="display:inline-block;margin:1px 4px 1px 0;padding:1px 6px;border-radius:3px;font-size:.85em;background:${isCurrent?'rgba(240,192,64,.15)':isPast?'rgba(78,204,163,.1)':'rgba(255,255,255,.05)'};color:${isPast||isCurrent?'var(--text)':'var(--text2)'}" title="${CLASS_FEATURE_DESC[f]||''}">${f}</span>`).join('')}
        </td>
      </tr>`;
    }
    html += `</tbody></table></div></div>`;

    // Level-up reminders
    if([5,10,15,20].includes(state.level)){
      html += `<div style="padding:8px 12px;background:rgba(240,192,64,.15);border-radius:4px;border-left:3px solid var(--gold);font-size:.9em;margin-bottom:10px">
        <strong style="color:var(--gold)">속성 부스트 레벨!</strong>
        <span style="color:var(--text2)"> 4개의 서로 다른 속성에 각각 +1 부스트를 적용하세요.</span>
      </div>`;
    }

    html += `</div>`;
  }

  // Notes
  html += `<div class="dash-block full">
    <h3>세션 메모</h3>
    <textarea class="notes-area" onchange="state.notes=this.value" placeholder="세션 중 메모를 여기에 기록하세요...">${state.notes}</textarea>
  </div>`;

  html += '</div>'; // dash-grid end
  return html;
}

// ===== ACTIONS =====
function selectAncestry(k){
  state.ancestry=k;
  state.heritage=null;
  state.ancestryFreeBoosts=[];
  state.altAncestryBoosts=false;
  state.altAncestryChoices=[];
  renderContent();renderFooter();
}
function selectHeritage(i){state.heritage=i;renderContent()}
function selectBackground(i){
  state.background=i;
  state.bgFixedBoost=null;
  state.bgFreeBoost=null;
  renderContent();renderFooter();
}
function selectClass(k){
  state.class_=k;
  state.selectedCantrips=[];
  state.selectedSpells=[];
  state.witchTradition=null;
  renderNav();
  renderContent();renderFooter();
}

function toggleAltAncestry(checked){
  state.altAncestryBoosts = checked;
  state.ancestryFreeBoosts = [];
  state.altAncestryChoices = [];
  renderContent();renderFooter();
}
function toggleAltAncestryChoice(attr){
  const idx = state.altAncestryChoices.indexOf(attr);
  if(idx>=0) state.altAncestryChoices.splice(idx,1);
  else if(state.altAncestryChoices.length<2) state.altAncestryChoices.push(attr);
  renderContent();renderFooter();
}
function toggleAncestryFreeBoost(attr){
  const idx = state.ancestryFreeBoosts.indexOf(attr);
  if(idx>=0) state.ancestryFreeBoosts.splice(idx,1);
  else {
    const anc = ANCESTRIES[state.ancestry];
    const freeCount = anc.boosts.filter(b=>b==='free').length;
    if(state.ancestryFreeBoosts.length<freeCount) state.ancestryFreeBoosts.push(attr);
  }
  renderContent();renderFooter();
}
function setBgFixedBoost(val){state.bgFixedBoost=val||null;if(state.bgFreeBoost===val)state.bgFreeBoost=null;renderContent();renderFooter()}
function setBgFreeBoostBtn(attr){
  if(state.bgFreeBoost===attr) state.bgFreeBoost=null;
  else if(attr!==state.bgFixedBoost) state.bgFreeBoost=attr;
  renderContent();renderFooter();
}
function toggleFreeBoost(attr){
  const idx = state.freeBoosts.indexOf(attr);
  if(idx>=0) state.freeBoosts.splice(idx,1);
  else if(state.freeBoosts.length<4) state.freeBoosts.push(attr);
  renderContent();renderFooter();
}

function toggleSkill(name){
  if(state.trainedSkills.includes(name)) state.trainedSkills=state.trainedSkills.filter(s=>s!==name);
  else state.trainedSkills.push(name);
  renderContent();
}

// Equipment actions - add to inventory (no gold deduction)
function addArmor(idx){
  const arm = ARMOR_DATA[idx];
  state.inventory.push({type:'armor',idx:idx,name:arm.name,en:arm.en,price:arm.price,bulk:arm.bulk,qty:1,desc:arm.desc||''});
  renderContent();renderFooter();
}
function addShield(idx){
  const sh = SHIELD_DATA[idx];
  state.inventory.push({type:'shield',idx:idx,name:sh.name,en:sh.en,price:sh.price,bulk:sh.bulk,qty:1,desc:sh.desc||''});
  renderContent();renderFooter();
}
function addWeapon(idx){
  const wp = WEAPON_DATA[idx];
  state.inventory.push({type:'weapon',idx:idx,name:wp.name,en:wp.en,price:wp.price,bulk:wp.bulk,qty:1,desc:wp.desc||''});
  renderContent();renderFooter();
}
function addGear(idx){
  const g = GEAR_DATA[idx];
  const existing = state.inventory.find(it=>it.type==='gear'&&it.idx===idx);
  if(existing){
    existing.qty++;
  } else {
    state.inventory.push({type:'gear',idx:idx,name:g.name,en:g.en,price:g.price,bulk:g.bulk,qty:1,desc:g.desc||''});
  }
  renderContent();renderFooter();
}

function removeInventoryItem(invIdx){
  const item = state.inventory[invIdx];
  if(!item) return;
  if(item.type==='armor' && state.equippedArmor===item.idx) state.equippedArmor=null;
  if(item.type==='shield' && state.equippedShield===item.idx) state.equippedShield=null;
  if(item.qty > 1){
    item.qty--;
  } else {
    state.inventory.splice(invIdx,1);
    delete state.inventorySlots[invIdx];
  }
  renderContent();renderFooter();
}

function toggleEquipArmor(idx){
  state.equippedArmor = (state.equippedArmor===idx) ? null : idx;
  renderContent();renderFooter();
}
function toggleEquipShield(idx){
  state.equippedShield = (state.equippedShield===idx) ? null : idx;
  renderContent();renderFooter();
}

// Spell actions
function toggleCantrip(en){
  const idx = state.selectedCantrips.indexOf(en);
  if(idx>=0) state.selectedCantrips.splice(idx,1);
  else state.selectedCantrips.push(en);
  renderContent();
}
function toggleSpell(en){
  const idx = state.selectedSpells.indexOf(en);
  if(idx>=0) state.selectedSpells.splice(idx,1);
  else state.selectedSpells.push(en);
  renderContent();
}
function setWitchTradition(val){
  state.witchTradition=val||null;
  state.selectedCantrips=[];
  state.selectedSpells=[];
  renderContent();
}

// Play Dashboard actions
function changeHP(amt){
  const maxHP = getMaxHP();
  state.currentHP = Math.max(0, Math.min(maxHP, state.currentHP + amt));
  if(state.currentHP <= 0){
    state.dying = Math.min(4, state.dying + 1 + state.wounded);
  }
  renderContent();
}
function changeDying(amt){
  state.dying = Math.max(0, Math.min(4, state.dying + amt));
  renderContent();
}
function changeWounded(amt){
  state.wounded = Math.max(0, Math.min(3, state.wounded + amt));
  renderContent();
}
function fullHeal(){
  state.currentHP = getMaxHP();
  state.tempHP = 0;
  state.dying = 0;
  state.wounded = 0;
  renderContent();
}
function changeXP(amt){
  state.xp = Math.max(0, state.xp + amt);
  renderContent();
}
function levelUp(){
  if(state.xp < 1000) return;
  state.xp -= 1000;
  state.level++;
  // Update max HP: recalculate
  const newMaxHP = getMaxHP();
  state.currentHP = newMaxHP; // Heal to new max on level up
  // Update header level display
  const lvEl = document.getElementById('charLevel');
  if(lvEl) lvEl.textContent = state.level;
  // Show level-up summary
  const clsKey = state.class_;
  const advData = clsKey ? CLASS_ADVANCEMENT[clsKey] : null;
  const newFeatures = advData ? (advData[state.level] || []) : [];
  let msg = `레벨 ${state.level} 달성!\n\n최대 HP: ${newMaxHP}`;
  if(newFeatures.length > 0){
    msg += `\n\n새로 획득한 특징:\n${newFeatures.map(f=>'- '+f).join('\n')}`;
  }
  if([5,10,15,20].includes(state.level)){
    msg += '\n\n** 속성 부스트 레벨! 4개 속성에 +1 부스트를 적용하세요. **';
  }
  alert(msg);
  renderContent();renderFooter();renderNav();
}
function toggleAction(n){
  if(state.actionsUsed >= n) state.actionsUsed = n - 1;
  else state.actionsUsed = n;
  renderContent();
}
function resetActions(){
  state.actionsUsed = 0;
  renderContent();
}
function toggleCondition(name, hasValue, max){
  if(hasValue){
    const current = state.conditions[name] || 0;
    if(current >= max) delete state.conditions[name];
    else state.conditions[name] = current + 1;
  } else {
    if(state.conditions[name]) delete state.conditions[name];
    else state.conditions[name] = 1;
  }
  renderContent();
}
function showConditionInfo(name){
  const cd = CONDITIONS_DATA[name];
  if(!cd) return;
  const panel = document.getElementById('condInfoPanel');
  document.getElementById('condInfoName').textContent = name + ' (' + cd.name + ')';
  document.getElementById('condInfoDesc').textContent = cd.desc;
  panel.style.display = 'block';
}
function showSpellInfo(type, en){
  if(type==='cantrip'){
    const data = CANTRIPS.find(c=>c.en===en);
    if(!data) return;
    const panel = document.getElementById('cantripInfoPanel');
    if(panel){
      document.getElementById('cantripInfoName').textContent = data.name + ' (' + data.en + ')';
      document.getElementById('cantripInfoDesc').textContent = data.fullDesc || data.desc;
      panel.style.display = 'block';
    }
  } else {
    const data = RANK1_SPELLS.find(s=>s.en===en);
    if(!data) return;
    const panel = document.getElementById('spellInfoPanel');
    if(panel){
      document.getElementById('spellInfoName').textContent = data.name + ' (' + data.en + ')';
      document.getElementById('spellInfoDesc').textContent = data.fullDesc || data.desc;
      panel.style.display = 'block';
    }
  }
}
function toggleSpellSlot(idx){
  const i = state.spellSlotsUsed.indexOf(idx);
  if(i>=0) state.spellSlotsUsed.splice(i,1);
  else state.spellSlotsUsed.push(idx);
  renderContent();
}
function resetSpellSlots(){
  state.spellSlotsUsed=[];
  renderContent();
}
function setItemSlot(idx, slot){
  state.inventorySlots[idx] = slot;
  renderContent();
}
function toggleItemDesc(idx){
  const el = document.getElementById('itemDesc'+idx);
  if(el) el.style.display = el.style.display==='none'?'block':'none';
}

// Save/Load
function saveChar(){
  state.name = document.getElementById('charName').value;
  localStorage.setItem('pf2e_char', JSON.stringify(state));
  alert('캐릭터가 저장되었습니다!');
}
function loadChar(){
  const d = localStorage.getItem('pf2e_char');
  if(d){
    const loaded = JSON.parse(d);
    // Merge with defaults for new fields
    Object.keys(state).forEach(k=>{
      if(loaded[k] !== undefined) state[k] = loaded[k];
    });
    // Ensure new fields exist
    if(!state.inventory) state.inventory=[];
    if(state.manualGold===undefined) state.manualGold=15;
    if(!state.selectedCantrips) state.selectedCantrips=[];
    if(!state.selectedSpells) state.selectedSpells=[];
    if(!state.conditions) state.conditions={};
    if(!state.spellSlotsUsed) state.spellSlotsUsed=[];
    if(!state.inventorySlots) state.inventorySlots={};
    if(!state.ancestryFreeBoosts) state.ancestryFreeBoosts=[];
    if(!state.altAncestryChoices) state.altAncestryChoices=[];
    if(state.altAncestryBoosts===undefined) state.altAncestryBoosts=false;
    if(state.bgFixedBoost===undefined) state.bgFixedBoost=state.bgBoostChoice||null;
    if(state.notes===undefined) state.notes='';
    if(state.xp===undefined) state.xp=0;
    document.getElementById('charName').value = state.name||'';
    document.getElementById('charLevel').textContent = state.level;
    renderNav();renderContent();renderFooter();
    alert('캐릭터를 불러왔습니다!');
  } else alert('저장된 캐릭터가 없습니다.');
}
function exportJSON(){
  state.name = document.getElementById('charName').value;
  const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (state.name||'character')+'.json';
  a.click();
}

// ===== INIT =====
renderNav();
renderContent();
renderFooter();

// Auto-load
const saved = localStorage.getItem('pf2e_char');
if(saved){
  try{
    const loaded = JSON.parse(saved);
    Object.keys(state).forEach(k=>{
      if(loaded[k] !== undefined) state[k] = loaded[k];
    });
    if(!state.inventory) state.inventory=[];
    if(state.manualGold===undefined) state.manualGold=15;
    if(!state.selectedCantrips) state.selectedCantrips=[];
    if(!state.selectedSpells) state.selectedSpells=[];
    if(!state.conditions) state.conditions={};
    if(!state.spellSlotsUsed) state.spellSlotsUsed=[];
    if(!state.inventorySlots) state.inventorySlots={};
    if(!state.ancestryFreeBoosts) state.ancestryFreeBoosts=[];
    if(!state.altAncestryChoices) state.altAncestryChoices=[];
    if(state.altAncestryBoosts===undefined) state.altAncestryBoosts=false;
    if(state.bgFixedBoost===undefined) state.bgFixedBoost=state.bgBoostChoice||null;
    if(state.notes===undefined) state.notes='';
    if(state.xp===undefined) state.xp=0;
    document.getElementById('charName').value = state.name||'';
    document.getElementById('charLevel').textContent = state.level;
    renderNav();renderContent();renderFooter();
  }catch(e){}
}

// Re-render nav on resize (handles orientation change for mobile/desktop labels)
let _resizeTimer;
window.addEventListener('resize', ()=>{
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(()=>{ renderNav(); }, 150);
});
