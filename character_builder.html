<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>패스파인더 2E 캐릭터 빌더</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--surface:#16213e;--card:#0f3460;--accent:#e94560;--accent2:#533483;--text:#eee;--text2:#aab;--gold:#f0c040;--green:#4ecca3;--border:#2a2a4a}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{background:linear-gradient(135deg,var(--accent2),var(--card));padding:12px 20px;display:flex;align-items:center;gap:15px;border-bottom:2px solid var(--accent)}
header h1{font-size:1.3em;color:var(--gold)}
header .char-name{background:transparent;border:1px solid var(--border);color:var(--text);padding:4px 12px;border-radius:4px;font-size:1em;width:200px}
header .char-name::placeholder{color:var(--text2)}
.main{display:flex;flex:1;overflow:hidden}
nav{width:180px;background:var(--surface);padding:10px 0;overflow-y:auto;border-right:1px solid var(--border);flex-shrink:0}
nav button{display:block;width:100%;padding:10px 15px;background:none;border:none;color:var(--text2);text-align:left;cursor:pointer;font-size:.9em;border-left:3px solid transparent;transition:.2s}
nav button:hover{background:rgba(255,255,255,.05);color:var(--text)}
nav button.active{background:rgba(233,69,96,.1);color:var(--accent);border-left-color:var(--accent);font-weight:bold}
nav button .step{color:var(--text2);font-size:.75em;margin-right:5px}
nav button .done{color:var(--green);margin-left:auto}
.content{flex:1;overflow-y:auto;padding:20px}
.tab{display:none}
.tab.active{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:15px}
.card{background:var(--card);border:2px solid var(--border);border-radius:8px;padding:15px;cursor:pointer;transition:.2s}
.card:hover{border-color:var(--accent);transform:translateY(-2px)}
.card.selected{border-color:var(--gold);box-shadow:0 0 15px rgba(240,192,64,.2)}
.card h3{color:var(--gold);margin-bottom:8px;font-size:1.1em}
.card .en{color:var(--text2);font-size:.8em;font-weight:normal}
.card .stats{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.card .stat{background:rgba(255,255,255,.08);padding:2px 8px;border-radius:3px;font-size:.8em}
.card .stat.boost{color:var(--green)}
.card .stat.flaw{color:var(--accent)}
.card .desc{color:var(--text2);font-size:.85em;margin-top:8px;line-height:1.4}
h2.section{color:var(--gold);margin-bottom:15px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.attr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:15px}
.attr-box{background:var(--card);border:2px solid var(--border);border-radius:8px;padding:15px;text-align:center}
.attr-box .name{font-size:.85em;color:var(--text2);margin-bottom:5px}
.attr-box .value{font-size:2em;font-weight:bold;color:var(--gold)}
.attr-box .breakdown{font-size:.75em;color:var(--text2);margin-top:5px}
.attr-box .boost-btn{margin-top:8px;padding:4px 12px;background:var(--green);color:#000;border:none;border-radius:4px;cursor:pointer;font-size:.85em}
.attr-box .boost-btn:disabled{background:#444;color:#888;cursor:not-allowed}
.attr-box .boost-btn.remove{background:var(--accent)}
footer{background:var(--surface);border-top:2px solid var(--border);padding:8px 20px;display:flex;gap:20px;align-items:center;font-size:.85em;flex-wrap:wrap}
footer .stat-item{display:flex;align-items:center;gap:5px}
footer .stat-item .label{color:var(--text2)}
footer .stat-item .val{color:var(--gold);font-weight:bold}
.heritage-list{margin-top:15px}
.heritage-item{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 15px;margin-bottom:8px;cursor:pointer;transition:.2s}
.heritage-item:hover{border-color:var(--accent)}
.heritage-item.selected{border-color:var(--gold);background:rgba(240,192,64,.05)}
.heritage-item h4{color:var(--green);margin-bottom:4px}
.heritage-item p{color:var(--text2);font-size:.85em}
select,input[type=text],input[type=number],textarea{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:4px;font-size:.9em;width:100%}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--accent)}
.form-group{margin-bottom:15px}
.form-group label{display:block;color:var(--text2);margin-bottom:5px;font-size:.85em}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.summary-block{background:var(--card);border-radius:8px;padding:15px}
.summary-block h3{color:var(--gold);margin-bottom:10px;font-size:1em}
.summary-block table{width:100%;font-size:.85em}
.summary-block td{padding:3px 5px}
.summary-block td:first-child{color:var(--text2)}
.summary-block td:last-child{color:var(--text);text-align:right}
.btn{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-size:.9em;transition:.2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#c73a50}
.btn-secondary{background:var(--accent2);color:#fff}
.btn-actions{display:flex;gap:10px;margin-top:20px}
.skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-top:15px}
.skill-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--card);border-radius:4px;font-size:.85em}
.skill-item input[type=checkbox]{accent-color:var(--green)}
.skill-item .skill-name{flex:1}
.skill-item .skill-attr{color:var(--text2);font-size:.75em}

/* Equipment styles */
.equip-section{margin-bottom:20px}
.equip-section h3{color:var(--green);margin-bottom:8px;font-size:1em}
.equip-table{width:100%;border-collapse:collapse;font-size:.85em;margin-bottom:10px}
.equip-table th{background:var(--surface);color:var(--gold);padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
.equip-table td{padding:5px 8px;border-bottom:1px solid var(--border)}
.equip-table tr:hover{background:rgba(255,255,255,.03)}
.equip-table .buy-btn{padding:2px 10px;background:var(--green);color:#000;border:none;border-radius:3px;cursor:pointer;font-size:.85em}
.equip-table .buy-btn:disabled{background:#444;color:#888;cursor:not-allowed}
.equip-table .sell-btn{padding:2px 10px;background:var(--accent);color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:.85em}
.gold-tracker{background:var(--card);padding:12px 18px;border-radius:8px;display:flex;align-items:center;gap:15px;margin-bottom:15px;font-size:1em}
.gold-tracker .gold-val{color:var(--gold);font-weight:bold;font-size:1.3em}
.inventory-list{background:var(--surface);border-radius:8px;padding:12px;margin-top:10px}
.inventory-list .inv-item{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-bottom:1px solid var(--border);font-size:.85em}
.inventory-list .inv-item:last-child{border-bottom:none}

/* Spell styles */
.spell-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:10px}
.spell-card{background:var(--card);border:2px solid var(--border);border-radius:6px;padding:8px 12px;cursor:pointer;transition:.2s;font-size:.85em}
.spell-card:hover{border-color:var(--accent)}
.spell-card.selected{border-color:var(--gold);background:rgba(240,192,64,.08)}
.spell-card .spell-name{color:var(--gold);font-weight:bold}
.spell-card .spell-info{color:var(--text2);font-size:.8em;margin-top:2px}

/* Play Dashboard */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.dash-block{background:var(--card);border-radius:8px;padding:15px}
.dash-block h3{color:var(--gold);margin-bottom:10px;font-size:1em;border-bottom:1px solid var(--border);padding-bottom:5px}
.dash-block.full{grid-column:1/-1}
.hp-display{display:flex;align-items:center;gap:15px;margin-bottom:10px}
.hp-big{font-size:2.5em;font-weight:bold;color:var(--green)}
.hp-sep{font-size:1.5em;color:var(--text2)}
.hp-max{font-size:1.5em;color:var(--text2)}
.hp-controls button{padding:4px 14px;border:none;border-radius:4px;cursor:pointer;font-size:1.1em;margin:0 3px}
.hp-controls .hp-minus{background:var(--accent);color:#fff}
.hp-controls .hp-plus{background:var(--green);color:#000}
.hp-controls input[type=number]{width:60px;text-align:center;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px;font-size:.9em}
.condition-grid{display:flex;flex-wrap:wrap;gap:6px}
.cond-btn{padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text2);cursor:pointer;font-size:.8em;transition:.2s}
.cond-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cond-btn .cond-val{color:var(--gold);font-weight:bold;margin-left:3px}
.action-display{display:flex;gap:10px;margin-top:10px}
.action-circle{width:50px;height:50px;border-radius:50%;border:3px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:1.5em;cursor:pointer;transition:.2s;color:var(--gold)}
.action-circle.used{background:var(--gold);color:var(--bg);opacity:.5}
.action-circle:hover{transform:scale(1.1)}
.slot-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:.9em}
.slot-row label{color:var(--text2)}
.slot-check{accent-color:var(--accent);width:18px;height:18px;cursor:pointer}
.combat-stat-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:.9em}
.combat-stat-row:last-child{border-bottom:none}
.combat-stat-row .cs-label{color:var(--text2)}
.combat-stat-row .cs-val{color:var(--gold);font-weight:bold}
.inv-slot-label{padding:2px 6px;border-radius:3px;font-size:.75em;cursor:pointer;border:1px solid var(--border)}
.inv-slot-label.active-slot{background:var(--green);color:#000;border-color:var(--green)}
.notes-area{width:100%;min-height:120px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:10px;font-size:.9em;resize:vertical}

@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(233,69,96,.5)}50%{box-shadow:0 0 15px 5px rgba(233,69,96,.3)}}
/* Condition info button - hidden on desktop, visible on mobile */
.cond-info-btn{display:none;width:18px;height:18px;border-radius:50%;background:var(--accent2);color:var(--text);font-size:.65em;text-align:center;line-height:18px;margin-left:4px;cursor:pointer;flex-shrink:0}

/* Nav icon for mobile */
.nav-icon{font-size:1.2em;line-height:1}

/* ===== Mobile Responsive ===== */
@media(max-width:768px){
  /* Dynamic viewport height for mobile browsers */
  body{height:100vh;height:100dvh}

  /* Main layout: stack vertically */
  .main{flex-direction:column}

  /* Nav becomes bottom tab bar */
  nav{
    width:100%;position:fixed;bottom:0;left:0;right:0;
    display:flex;flex-direction:row;overflow-x:auto;overflow-y:hidden;
    border-top:2px solid var(--accent);border-right:none;
    z-index:100;padding:0;
    -webkit-overflow-scrolling:touch;
    background:var(--surface);
  }
  nav button{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    flex-shrink:0;padding:8px 12px;font-size:.75em;
    text-align:center;border-left:none;
    border-bottom:3px solid transparent;
    min-width:60px;min-height:48px;
  }
  nav button:hover{background:rgba(255,255,255,.05)}
  nav button.active{
    border-left-color:transparent;border-bottom-color:var(--accent);
    background:rgba(233,69,96,.1);
  }
  nav button .step{display:none}
  nav button .done{display:none}

  /* Content area with bottom nav clearance */
  .content{padding:12px;padding-bottom:75px}

  /* Header compact */
  header{padding:8px 12px;flex-wrap:wrap}
  header h1{font-size:1em}
  header .char-name{width:100%;margin-top:4px;order:10}

  /* Footer: hide on mobile */
  footer{display:none}

  /* Cards grid - single column */
  .cards{grid-template-columns:1fr;gap:8px}
  .card{padding:10px}

  /* Attribute grid - 2 columns */
  .attr-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .attr-box{padding:10px}
  .attr-box .value{font-size:1.5em}

  /* Skills grid - single column */
  .skill-grid{grid-template-columns:1fr}

  /* Equipment tables - horizontal scroll */
  .equip-table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}

  /* Spell grid */
  .spell-grid{grid-template-columns:1fr 1fr}

  /* Dashboard */
  .dash-grid{grid-template-columns:1fr}
  .hp-big{font-size:2em}
  .hp-display{flex-wrap:wrap}
  .hp-controls button{min-width:44px;min-height:44px;padding:8px 14px}
  .action-circle{width:44px;height:44px;font-size:1.2em}

  /* Summary grid */
  .summary-grid{grid-template-columns:1fr}

  /* Condition buttons */
  .cond-btn{padding:4px 10px;font-size:.75em;min-height:36px;display:inline-flex;align-items:center}
  .cond-info-btn{display:inline-flex;align-items:center;justify-content:center}

  /* Touch-friendly: all buttons minimum 44px touch target */
  .btn,.buy-btn,.sell-btn,.boost-btn,
  .equip-table .buy-btn,.equip-table .sell-btn{
    min-height:44px;min-width:44px;padding:8px 12px;
  }

  /* Heritage items */
  .heritage-item{padding:12px 15px}

  /* Form elements */
  select,input[type=text],input[type=number],textarea{
    min-height:44px;font-size:16px; /* 16px prevents iOS zoom */
  }

  /* Spell card larger touch target */
  .spell-card{padding:12px;min-height:44px}

  /* Inventory */
  .inventory-list .inv-item{padding:8px;min-height:44px}

  /* Notes textarea */
  .notes-area{min-height:100px}

  /* Slot checkboxes */
  .slot-check{width:22px;height:22px}

  /* Combat stat rows */
  .combat-stat-row{padding:8px 4px}

  /* Boost buttons in attr tab */
  .attr-box .boost-btn{min-height:40px;padding:8px 12px;font-size:.85em}

  /* Inv slot labels */
  .inv-slot-label{min-height:36px;padding:6px 10px;display:inline-flex;align-items:center}
}

/* Small phones */
@media(max-width:400px){
  .cards{grid-template-columns:1fr}
  .spell-grid{grid-template-columns:1fr}
  .attr-grid{grid-template-columns:1fr 1fr}
  header h1{font-size:.9em}
  .content{padding:8px;padding-bottom:70px}
  nav button{padding:6px 8px;min-width:52px;font-size:.7em}
}
</style>
</head>
<body>

<header>
  <h1>PF2E 캐릭터 빌더</h1>
  <input class="char-name" id="charName" type="text" placeholder="캐릭터 이름 입력...">
  <span style="margin-left:auto;font-size:.8em;color:var(--text2)">Lv.</span>
  <span id="charLevel" style="color:var(--gold);font-weight:bold">1</span>
</header>

<div class="main">
  <nav id="nav"></nav>
  <div class="content" id="content"></div>
</div>

<footer id="footer"></footer>

<script>
// ===== DATA =====
const ATTRS = ['str','dex','con','int','wis','cha'];
const ATTR_NAMES = {str:'근력',dex:'민첩',con:'건강',int:'지능',wis:'지혜',cha:'매력'};
const ATTR_EN = {str:'STR',dex:'DEX',con:'CON',int:'INT',wis:'WIS',cha:'CHA'};

const ANCESTRIES = {
  dwarf:{name:'드워프',en:'Dwarf',hp:10,size:'중형',speed:20,boosts:['con','wis','free'],flaw:'cha',
    vision:'암시야',langs:['공용어','드워프어'],desc:'과묵하고 강인한 산악 종족. 장인 정신과 가족을 중시합니다.',
    heritages:[
      {name:'고대혈',en:'Ancient-Blooded',desc:'마법 효과에 대한 내성에 +1 상황 보너스 (반응)'},
      {name:'사망 수호',en:'Death Warden',desc:'공허/언데드 효과에 대한 내성 성공→대성공'},

      {name:'바위',en:'Rock',desc:'밀기/넘어뜨리기에 +2, 강제 이동 절반'},
      {name:'강혈',en:'Strong-Blooded',desc:'레벨 절반 독 저항, 독 내성 성공 시 2단계 감소'}
    ]},
  elf:{name:'엘프',en:'Elf',hp:6,size:'중형',speed:30,boosts:['dex','int','free'],flaw:'con',
    vision:'저광 시야',langs:['공용어','엘프어'],desc:'오래 사는 신비로운 종족. 지성과 아름다움을 중시합니다.',
    heritages:[
      {name:'북극',en:'Arctic',desc:'냉기 저항 = 레벨 절반'},
      {name:'숲 주민',en:'Woodland',desc:'등반 속도 10피트 또는 험지(숲) 무시'},
      {name:'동굴 주민',en:'Cavern',desc:'암시야'},
      {name:'사막',en:'Desert',desc:'환경 열 한 단계 감소'},

  gnome:{name:'노움',en:'Gnome',hp:8,size:'소형',speed:25,boosts:['con','cha','free'],flaw:'str',
    vision:'저광 시야',langs:['공용어','노움어','숲요정어'],desc:'호기심 많고 활기찬 소형 종족. 표백을 두려워합니다.',
    heritages:[
      {name:'카멜레온',en:'Chameleon',desc:'환경에 따라 피부색 변화, 은신 보너스'},
      {name:'감각 민감',en:'Sensate',desc:'부정확 후각 30피트'},
      {name:'요정 혈통',en:'Fey-Touched',desc:'캔트립 1개 획득'},
      {name:'광석 노움',en:'Wellspring',desc:'캔트립 1개 획득 (원시)'},
      {name:'움브랄',en:'Umbral',desc:'암시야'}
    ]},
  goblin:{name:'고블린',en:'Goblin',hp:6,size:'소형',speed:25,boosts:['dex','cha','free'],flaw:'wis',
    vision:'암시야',langs:['공용어','고블린어'],desc:'장난기 많고 창의적인 소형 종족. 불과 노래를 좋아합니다.',
    heritages:[
      {name:'잡식',en:'Charhide',desc:'화염 저항 = 레벨 절반'},
      {name:'이빨이 날카로운',en:'Razortooth',desc:'턱 비무장 공격 1d6 P'},
      {name:'눈 없는',en:'Unbreakable',desc:'HP +4'},
      {name:'눈보라',en:'Snow',desc:'냉기 저항 = 레벨 절반'},
      {name:'포식자',en:'Tailed',desc:'꼬리로 균형 +2'}
    ]},
  halfling:{name:'하플링',en:'Halfling',hp:6,size:'소형',speed:25,boosts:['dex','wis','free'],flaw:'str',

      {name:'황혼빛',en:'Twilight',desc:'저광 시야'},
      {name:'야생 자식',en:'Wildwood',desc:'험지(자연) 무시'},
      {name:'감시자',en:'Observant',desc:'감지 판정에 +1 상황 보너스'}
    ]},
  human:{name:'인간',en:'Human',hp:8,size:'중형',speed:25,boosts:['free','free'],flaw:null,
    vision:'일반',langs:['공용어'],desc:'다양하고 야심 찬 종족. 어디에서든 적응합니다.',
    heritages:[
      {name:'숙련된',en:'Skilled',desc:'1레벨 일반 특기 1개 추가'},
      {name:'다재다능한',en:'Versatile',desc:'1레벨 일반 특기 1개 추가'},

  {name:'방패',en:'Shield',traditions:['arcane','divine','occult'],desc:'AC +1 상황 보너스',fullDesc:'[1행동] — 캔트립 1\n특질: 캔트립, 집중, 힘\n전통: 비전, 신성, 비학\n지속 시간: 다음 턴 시작까지\n\n마법의 힘으로 된 방패를 만듭니다. 다음 턴 시작까지 AC에 +1 상황 보너스를 얻습니다. 방패 막기(Shield Block) 반응이 있으면, 이 마법 방패로도 사용할 수 있습니다. 경도 5이며, 이 방식으로 피해를 받으면 주문이 종료되고 10분간 방패를 다시 시전할 수 없습니다.\n\n강화(3등급): 경도 10.\n강화(5등급): 경도 15.\n강화(7등급): 경도 20.\n강화(9등급): 경도 25.'},
  {name:'안정화',en:'Stabilize',traditions:['divine','primal'],desc:'죽어가는 생명체 안정화',fullDesc:'[2행동] — 캔트립 1\n특질: 캔트립, 집중, 치유, 조작, 활력\n전통: 신성, 원시\n사거리: 30피트 | 대상: 빈사(dying) 상태의 생물 1\n\n활력 에너지가 대상에 흘러들어 빈사 상태를 안정시킵니다. 대상의 빈사 수치가 0이 되고 안정(stabilized)됩니다. 대상이 HP를 회복하거나 의식을 되찾지는 못합니다.'},
  {name:'덩굴 발',en:'Tangle Foot',traditions:['arcane','primal'],desc:'이동 방해',fullDesc:'[2행동] — 캔트립 1\n특질: 캔트립, 집중, 조작, 식물\n전통: 비전, 원시\n사거리: 30피트 | 대상: 생물 1\n방어: 반사\n\n덩굴을 소환하여 적을 얽어맵니다. 대상이 반사 내성에 실패하면 5피트 끌려오고 다음 탈출할 때까지 이동 불가(immobilized). 대실패 시 넘어뜨려짐(prone)과 이동 불가.\n\n강화(2등급): 실패 시 대상이 방심(off-guard)도 됩니다.\n강화(4등급): 실패 시 대상이 10피트 끌려옵니다.'},
  {name:'염동 투사체',en:'Telekinetic Projectile',traditions:['arcane','occult'],desc:'물체 투척 피해',fullDesc:'[2행동] — 캔트립 1\n특질: 캔트립, 집중, 조작\n전통: 비전, 비학\n사거리: 30피트 | 대상: 생물 1\n방어: AC\n\n물체를 염동력으로 발사하여 적에게 날립니다. 주문 공격 굴림을 합니다. 성공 시 1d6 둔기, 관통, 또는 참격 피해(발사한 물체에 적합한 유형, 시전 시 선택)를 가합니다.\n\n강화(+1): 피해 +1d6.'},
  {name:'공허 왜곡',en:'Void Warp',traditions:['arcane','divine','occult','primal'],desc:'공허 에너지 피해',fullDesc:'[2행동] — 캔트립 1\n특질: 캔트립, 집중, 조작, 공허\n전통: 비전, 신성, 비학, 원시\n사거리: 30피트 | 대상: 살아있는 생물 1\n방어: 기본 인내\n\n공허 에너지로 산 것을 피해입히고 약화시킵니다. 대상에 1d4 공허 피해를 가합니다. 기본 인내 내성. 실패 시 약화 1도 1라운드간.\n\n강화(+1): 피해 +1d4.'}
];

const RANK1_SPELLS = [
  {name:'축복',en:'Bless',traditions:['divine','occult'],desc:'아군 공격에 +1 상태 보너스',fullDesc:'[2행동] — 주문 1\n특질: 집중, 조작, 정신\n전통: 신성, 비학\n영역: 10피트 발산 | 지속 시간: 1분\n\n아군(자신 포함) 공격 굴림에 +1 상태 보너스. 유지 시 반경 +10피트. 재앙(bane)을 상쇄 가능.'},
  {name:'불타는 손',en:'Burning Hands',traditions:['arcane','primal'],desc:'원뿔 화염 피해',fullDesc:'[2행동] — 주문 1\n특질: 집중, 화염, 조작\n전통: 비전, 원시\n영역: 15피트 원뿔 | 방어: 기본 반사\n\n2d6 화염 피해. 기본 반사.\n\n강화(+1): +2d6.'},
  {name:'매혹',en:'Charm',traditions:['arcane','occult'],desc:'대상을 우호적으로',fullDesc:'[2행동] — 주문 1\n특질: 집중, 감정, 무력화, 조작, 정신, 은밀\n전통: 비전, 비학, 원시\n사거리: 30피트 | 대상: 생물 1\n방어: 의지 | 지속 시간: 1시간\n\n최근 위협/적대 시 의지에 +4 상황 보너스. 적대 행동 시 종료.\n\n대성공: 영향 없음+인지.\n성공: 영향 없음.\n실패: 태도 우호적, 적대 불가.\n대실패: 태도 도움, 적대 불가.\n\n강화(4등급): 다음 일일 준비까지.\n강화(8등급): 준비까지+10 대상.'},
  {name:'색채 분사',en:'Color Spray',traditions:['arcane','occult'],desc:'원뿔 현혹+실명',fullDesc:'[2행동] — 주문 1\n특질: 집중, 무력화, 조작, 시각\n전통: 비전, 비학\n사거리: 15피트 | 영역: 15피트 원뿔\n방어: 의지\n\n소용돌이치는 색채가 생물을 눈멀게, 눈부시게, 또는 멍하게 합니다.\n\n대성공: 영향 없음.\n성공: 1라운드 눈부심(dazzled).\n실패: 1라운드 눈멈+1분 눈부심.\n대실패: 1라운드 멍해짐(stunned) 1+1분 눈멈+10분 눈부심.'},
  {name:'명령',en:'Command',traditions:['arcane','divine','occult'],desc:'1회 행동 강제',fullDesc:'[2행동] — 주문 1\n특질: 청각, 집중, 언어, 조작, 정신\n전통: 비전, 신성, 비학\n사거리: 30피트 | 대상: 생물 1\n방어: 의지 | 지속 시간: 대상의 다음 턴 끝까지\n\n다가오기/도망치기/놓기/엎드리기/일어서기 중 하나를 명령. 의지 실패 시 다음 턴 첫 행동으로 수행.\n\n강화(5등급): 10 생물.\n강화(6등급): 자유 행동 지정.'},
  {name:'공포',en:'Fear',traditions:['arcane','divine','occult','primal'],desc:'겁먹은 상태 부여',fullDesc:'[2행동] — 주문 1\n특질: 집중, 감정, 공포, 조작, 정신\n전통: 비전, 신성, 비학, 원시\n사거리: 30피트 | 대상: 생물 1\n방어: 의지\n\n생물을 겁먹게 합니다.\n\n대성공: 영향 없음.\n성공: 공포(frightened) 1.\n실패: 공포 2.\n대실패: 공포 3 + 도주(fleeing) 1라운드.\n\n강화(3등급): 30피트 폭발 영역의 모든 생물 대상 가능.'},
  {name:'고블린 역병',en:'Goblin Pox',traditions:['arcane','primal'],desc:'질병 부여',fullDesc:'[2행동] — 주문 1\n특질: 집중, 질병, 조작\n전통: 비전, 원시\n사거리: 접촉 | 대상: 생물 1\n방어: 인내\n\n대상을 고블린 천연두에 감염시킵니다. 인내 실패 시 즉시 구역질(sickened) 1.\n\n고블린 천연두: 최대 단계 3.\n1단계: 구역질 1.\n2단계: 구역질 1+느려짐 1.\n3단계: 구역질 1+느려짐 1(실외에서 다른 감염자에 전파 가능).'},
  {name:'기름칠',en:'Grease',traditions:['arcane','primal'],desc:'영역을 미끄럽게',fullDesc:'[2행동] — 주문 1(또는 3)\n특질: 집중, 조작\n전통: 비전\n사거리: 30피트 | 대상: 물체 1 또는 영역 4개의 인접 5피트 칸\n지속 시간: 1분\n\n대상이나 영역을 미끄러운 기름으로 덮습니다. 물체에 시전하면 잡고 있는 생물이 반사 내성에 실패 시 물체를 떨어뜨립니다. 영역에 시전하면 험지가 되며, 생물이 이동 시 곡예 판정(주문 DC) 실패하면 넘어뜨려짐.'},
  {name:'돌풍',en:'Gust of Wind',traditions:['arcane','primal'],desc:'강풍 밀기',fullDesc:'[2행동] — 주문 1\n특질: 공기, 집중, 조작\n전통: 비전, 원시\n영역: 60피트 직선\n\n바람이 불을 끄고 물체와 생물을 밀어냅니다. 비마법 화염을 끄고, 중형 이하 생물은 인내 DC에 대해 밀려남. 비행 생물에 더 강하게 영향.'},
  {name:'치유',en:'Heal',traditions:['divine','occult','primal'],desc:'HP 회복 1d8+',fullDesc:'[1~3행동] — 주문 1\n특질: 집중, 치유, 조작, 활력\n전통: 신성, 원시\n\n활력 에너지가 산 것을 치유하거나 언데드를 해칩니다.\n\n1행동: 접촉 대상 1, 1d8 HP 회복(산 것에) 또는 피해(언데드에).\n2행동: 30피트 사거리 대상 1, 같은 효과.\n3행동: 30피트 발산 영역 모든 생물에 영향. 산 것에 회복 시 내성 없음. 언데드에 피해 시 기본 인내.\n\n강화(+1): 피해/회복 +1d8. 3행동 시전 시 +1d8 대신 +1d10.'},
  {name:'해악',en:'Harm',traditions:['divine'],desc:'공허 에너지 피해 1d8',fullDesc:'[1~3행동] — 주문 1\n특질: 집중, 조작, 공허\n전통: 신성\n\n공허 에너지가 산 것을 해치거나 언데드를 치유합니다.\n\n1행동: 접촉 대상 1, 1d8 피해(산 것에) 또는 회복(언데드에).\n2행동: 30피트 사거리 대상 1, 같은 효과.\n3행동: 30피트 발산 영역 모든 생물에 영향. 산 것에 피해 시 기본 인내. 언데드 치유 시 내성 없음.\n\n강화(+1): 피해/회복 +1d8.'},
  {name:'수력 밀기',en:'Hydraulic Push',traditions:['arcane','primal'],desc:'물 밀기 공격',fullDesc:'[2행동] — 주문 1\n특질: 집중, 조작, 물\n전통: 비전, 원시\n사거리: 60피트 | 대상: 생물 1\n방어: 인내\n\n물의 폭발로 생물에 피해를 주고 밀어냅니다. 3d6 둔기 피해(인내). 실패 시 5피트 밀려남. 대실패 시 10피트 밀려남+넘어뜨려짐.\n\n강화(+1): 피해 +2d6.'},
  {name:'도약',en:'Jump',traditions:['arcane','primal'],desc:'높이뛰기/멀리뛰기 강화',fullDesc:'[1행동] — 주문 1\n특질: 집중, 조작\n전통: 비전, 원시\n\n인상적인 도약을 합니다. 즉시 높이뛰기 또는 멀리뛰기를 합니다. 운동 판정 대신 주문 공격 굴림을 사용하며, 질주 없이 멀리뛰기가 가능합니다.\n\n강화(3등급): 최대 도약 거리 30피트.'},
  {name:'잠금',en:'Lock',traditions:['arcane','divine'],desc:'문/상자 마법 잠금',fullDesc:'[2행동] — 주문 1\n특질: 집중, 조작\n전통: 비전, 신성, 비학\n사거리: 접촉 | 대상: 잠긴 문, 용기 등 1\n지속 시간: 다음 일일 준비까지\n\n자물쇠를 훨씬 열기 어렵게 만듭니다. 도둑질 DC에 +4 상태 보너스를 추가합니다. 열쇠(knock) 주문은 잠금의 등급에 따라 상쇄를 시도합니다.'},
  {name:'마법 화살',en:'Magic Missile',traditions:['arcane'],desc:'자동 명중 역장 피해',fullDesc:'[1~3행동] — 주문 1\n특질: 집중, 힘, 조작\n전통: 비전, 비학\n사거리: 30피트 | 대상: 생물 1~3\n\n오류 없는 마법 힘의 파편으로 생물을 강타합니다. 1행동 시 1발(1d4+1 힘 피해), 2행동 시 2발, 3행동 시 3발. 각 탄을 같은 대상이나 다른 대상에 배분할 수 있습니다. 공격 굴림 없이 자동 명중.\n\n강화(+2): 탄 1발 추가.'},
  {name:'마법 무기',en:'Magic Weapon',traditions:['arcane','divine','occult','primal'],desc:'무기 +1 아이템 보너스',fullDesc:'[1행동] — 주문 1\n특질: 집중, 조작\n전통: 비전, 신성, 비학, 원시\n사거리: 접촉 | 대상: 무기 1\n지속 시간: 1분\n\n무기에 일시적으로 마법 룬을 적용합니다. 무기가 +1 무기 강화 룬이 새겨진 것처럼 +1 아이템 보너스를 얻습니다. 이미 룬이 있으면 효과 없음.\n\n강화(4등급): +1 타격 룬 + 속성 룬 1개 추가.'},
  {name:'수선',en:'Mending',traditions:['divine','primal'],desc:'물체 수리',fullDesc:'[2행동] — 주문 1\n특질: 집중, 조작\n전통: 비전, 신성, 비학, 원시\n시전: 10분 | 사거리: 접촉 | 대상: 비마법 물체 1\n\n비마법 아이템 하나를 수리합니다. 아이템의 HP를 주문시전 판정 결과만큼 회복시킵니다. 파손(broken) 상태를 해제할 수 있습니다. 완전히 파괴된 아이템은 수리할 수 없습니다.\n\n강화(2등급): 마법 아이템도 수리 가능.'},
  {name:'신비 갑옷',en:'Mystic Armor',traditions:['arcane','divine','occult','primal'],desc:'AC +1 아이템 보너스',fullDesc:'[2행동] — 주문 1\n특질: 집중, 조작\n전통: 비전, 신성, 비학, 원시\n지속 시간: 다음 일일 준비까지\n\n마법 갑옷으로 자신을 보호합니다. AC에 +1 아이템 보너스를 얻습니다. 갑옷을 착용하고 있으면 이 주문은 효과가 없습니다.\n\n강화(4등급): AC에 +2 아이템 보너스.\n강화(6등급): +3.\n강화(8등급): +4.'},
  {name:'룬 신체',en:'Runic Body',traditions:['arcane','divine','occult','primal'],desc:'비무장 공격 강화',fullDesc:'[1행동] — 주문 1\n특질: 집중, 조작\n전통: 비전, 신성, 비학, 원시\n대상: 자신 | 지속 시간: 1분\n\n생물의 비무장 공격에 일시적으로 마법 룬을 적용합니다. 비무장 공격이 +1 무기 강화 룬이 새겨진 것처럼 +1 아이템 보너스를 얻습니다.\n\n강화(4등급): +1 타격 룬 + 속성 룬 1개 효과 추가.\n강화(+2 이후): 속성 룬 추가.'},
  {name:'성역',en:'Sanctuary',traditions:['divine'],desc:'공격 대상 지정 차단',fullDesc:'[2행동] — 주문 1\n특질: 집중, 조작\n전통: 신성, 비학\n사거리: 접촉 | 대상: 생물 1\n방어: 의지 | 지속 시간: 1분\n\n생물을 공격받지 않도록 보호합니다. 대상을 공격하거나 해치려는 생물은 먼저 의지 내성을 시도해야 합니다. 성공 시 정상 공격 가능, 실패 시 해당 턴에 대상을 공격 불가. 대상이 적대 행동을 하면 주문 종료.'},
  {name:'수면',en:'Sleep',traditions:['arcane','occult'],desc:'대상을 잠들게',fullDesc:'[2행동] — 주문 1\n특질: 집중, 무력화, 조작, 정신\n전통: 비전, 비학\n사거리: 30피트 | 영역: 5피트 폭발\n방어: 의지\n\n작은 영역의 생물을 잠재웁니다. 각 생물이 의지 내성 시도.\n\n대성공: 영향 없음.\n성공: 1라운드 졸림(drowsy, -1 판정).\n실패: 무의식(unconscious)으로 잠듬. 흔들거나 피해를 주면 깨어남.\n대실패: 무의식, 1라운드 동안 흔들거나 피해로 깨어나지 않음.\n\n강화(4등급): 영역 10피트 폭발.'},

  {name:'동물 소환',en:'Summon Animal',traditions:['arcane','primal'],desc:'동물 1마리 소환',fullDesc:'[3행동] — 주문 1\n특질: 집중, 조작\n전통: 비전, 원시\n사거리: 30피트 | 지속 시간: 유지(최대 1분)\n\n당신을 위해 싸울 동물을 소환합니다. 주문 등급 -1 이하 레벨의 동물을 소환합니다. 소환된 동물은 하수인 특질을 얻습니다.\n\n강화(2등급): 주문 등급 이하 레벨. 이후 등급마다 더 강한 동물 소환 가능.'},
  {name:'확실한 일격',en:'Sure Strike',traditions:['arcane','occult'],desc:'공격 굴림 2회 중 택1',fullDesc:'[1행동] — 주문 1\n특질: 집중\n전통: 비전, 비학\n\n다음 공격이 특히 정확합니다. 이 턴의 다음 공격 굴림에서 d20을 두 번 굴려 높은 것을 사용(행운 효과).'},
  {name:'참격',en:'True Strike',traditions:['arcane','occult'],desc:'공격 굴림 2회 중 택1',fullDesc:'[1행동] — 주문 1\n특질: 집중\n전통: 비전, 비학\n\n다음 공격이 특히 정확합니다. 이 턴의 다음 공격 굴림에서 d20을 두 번 굴려 높은 것을 사용(행운 효과).'},
  {name:'영혼 연결',en:'Spirit Link',traditions:['divine'],desc:'대상 HP 회복 시 시전자도 피해',fullDesc:'[2행동] — 주문 1\n특질: 집중, 치유, 조작\n전통: 신성, 비학\n사거리: 30피트 | 대상: 동의 생물 1\n지속 시간: 10분\n\n자신의 HP를 지속적으로 다른 이에게 전달합니다. 대상이 피해를 받을 때마다, 피해의 절반을 당신이 대신 받습니다(영혼 연결을 통해).'},
  {name:'환영 고통',en:'Phantom Pain',traditions:['occult'],desc:'정신 피해 + 지속 피해',fullDesc:'[2행동] — 주문 1\n특질: 집중, 환영, 조작, 정신\n전통: 비학\n사거리: 30피트 | 대상: 생물 1\n방어: 의지 | 지속 시간: 1분\n\n지속적인 고통으로 구역질을 유발합니다. 2d4 정신 피해 + 1d4 지속 정신 피해(의지). 지속 피해 받는 동안 구역질(sickened) 1.\n\n강화(+1): 초기 +2d4, 지속 +1d4.'},

  '메스꺼운':{name:'구역질',desc:'메스꺼워합니다. 모든 판정과 DC에 상태 페널티 = 구역질 수치. 자발적으로 아무것도 삼킬 수 없습니다(포션, 비약 포함). 1행동을 소비하여 인내 내성(구역질을 유발한 효과의 DC)으로 구역질을 줄이려 시도할 수 있습니다.'},
  '엎드린':{name:'엎드려짐',desc:'바닥에 누워 있습니다. 방심(off-guard)이 되며, 공격에 -2 상황 페널티. 사용 가능한 행동은 엎드러진 상태에서 가능한 것만. 일어나기(Stand)에 1행동이 필요합니다. 원거리 공격을 받을 때 +1 상황 보너스 AC를 얻습니다.'},

  '은폐된':{name:'은폐',desc:'안개, 어둠 등으로 잘 보이지 않습니다. 대상을 공격하려면 DC 5 단순 판정에 성공해야 합니다. 실패하면 공격이 빗나갑니다.'},
  '숨은':{name:'숨겨짐',desc:'위치는 알려져 있지만 정확히 볼 수 없는 상태. 숨겨진 대상을 공격하려면 DC 11 단순 판정에 성공해야 합니다. 탐색(Seek)으로 관측 상태로 만들 수 있습니다.'},
  '기절한':{name:'멍해짐',desc:'잠시 멍해졌습니다. 행동이나 반응을 사용할 수 없습니다. 멍해짐에 수치가 있으면 턴 시작 시 해당 수치만큼 행동을 잃습니다(행동 대신 소비). 멍해짐에 지속 시간이 있으면 해당 지속 시간 동안 행동/반응 불가.'},
  '느려진':{name:'느려짐',desc:'반응이 느려졌습니다. 턴 시작 시 행동이 느려짐 수치만큼 감소합니다(예: 느려짐 1이면 3행동 대신 2행동). 반응에는 영향 없음.'},
  '가속된':{name:'가속',desc:'매 턴 추가 행동 1개를 얻습니다. 대부분의 가속 효과는 추가 행동의 용도를 제한합니다(예: 가속 주문은 보폭/타격에만). 여러 가속 효과는 누적되지 않습니다.'},
  '지친':{name:'피로',desc:'피로하여 AC와 내성에 -1 상태 페널티. 탐험 활동을 선택할 수 없습니다. 장기 휴식(8시간)으로 해소.'},
  '도주':{name:'도주',desc:'공포에 질려 도망칩니다. 매 턴 모든 행동을 공포원에서 가능한 한 멀리 도망치는 데 사용해야 합니다. 갈 곳이 없으면 다른 행동 가능.'},
  '잡힌':{name:'조이기',desc:'잡혀 있습니다. 이동 불가(immobilized) + 방심(off-guard). 탈출(Escape) 행동으로 빠져나올 수 있습니다. 잡는 쪽이 상호작용으로 풀어줄 수도 있습니다.'},
  '속박된':{name:'억제',desc:'완전히 속박되어 있습니다. 이동 불가 + 방심 + 조작 행동에 DC 5 단순 판정. 탈출(Escape)로 빠져나올 수 있습니다.'},
  '눈먼':{name:'눈멈',desc:'시각을 완전히 잃습니다. 모든 지형이 험지. 시각이 필요한 판정에 대실패. 대상을 지정하려면 DC 11 단순 판정. 시각 기반 공격/효과에 면역.'},
  '귀먹은':{name:'귀먹음',desc:'청각을 잃습니다. 청각 기반 감지에 자동 대실패. 주문시전 시 DC 5 단순 판정 필요(실패 시 주문 소실).'},
  '투명':{name:'투명',desc:'시각으로 감지할 수 없습니다. 미탐지(undetected) 상태가 됩니다(시각에 대해). 청각 등 다른 감각으로는 감지 가능. 투명 생물에 대한 공격은 DC 11 단순 판정(숨겨짐이면) 또는 칸 추측+DC 11(미탐지면).'},
  '석화':{name:'석화',desc:'돌로 변했습니다. 어떤 행동도 할 수 없으며, 감각이 작동하지 않습니다. AC 9, 경도 8, HP 50. 시간이 지나면 원래 형태로 복원될 수 있습니다. 석화 중 파괴되면 원래 형태로 복원 시 해당 부위가 손상됩니다.'},
  '위축된':{name:'서투름',desc:'움직임이 어색합니다. 민첩 기반 판정과 DC에 상태 페널티 = 서투름 수치. AC(민첩 부분), 반사 내성에도 영향.'},
  '배수된':{name:'배수',desc:'생명력이 고갈됩니다. 건강 기반 판정에 상태 페널티 = 배수 수치. 또한 최대 HP가 레벨 x 배수 수치만큼 감소합니다. 장기 휴식 시 1 감소합니다.'},
  '허약한':{name:'약화',desc:'신체적으로 약해집니다. 근력 기반 판정과 DC에 상태 페널티 = 약화 수치. 근접 피해 굴림에도 영향.'},
  '멍한':{name:'멍청함',desc:'정신이 둔해졌습니다. 정신 기반 판정과 DC에 상태 페널티 = 멍청함 수치. 주문시전 시마다 DC 5 + 멍청함 수치의 단순 판정에 실패하면 주문이 소실됩니다.'},
  '혼란':{name:'혼란',desc:'정신이 혼미합니다. 행동을 제어할 수 없으며, 매 턴 무작위 행동(가장 가까운 생물 공격, 아무것도 안 함 등). 협공 불가, 아군에 대한 반응 불가. 매 턴 종료 시 의지 DC = 주문/효과 DC로 탈출 시도 가능.'},
  '지배':{name:'지배',desc:'다른 생물이 당신의 행동을 지배합니다. 지배자가 명령하는 대로 행동해야 합니다. 자신의 반응을 사용할 수 없습니다.'},
  '마비':{name:'마비',desc:'완전히 움직일 수 없습니다. 방심(off-guard)이 되며, 물리적 행동을 할 수 없습니다. 순수 정신적 행동(정신 주문의 유지 등)만 가능합니다.'},
  '운명':{name:'운명',desc:'죽음이 가까워옵니다. 빈사 상태의 사망 수치가 운명 수치만큼 감소합니다(예: 운명 1이면 빈사 3에서 사망). 장기 휴식 시 1 감소합니다. 일부 강력한 효과만이 이 상태를 부여합니다.'},
  '부상':{name:'부상',desc:'심각한 부상을 입었습니다. 빈사 상태가 될 때 빈사 수치에 부상 수치를 추가합니다(예: 부상 1이면 빈사 2로 시작). 장기 휴식이나 치유 주문 등으로 전체 HP를 회복하면 부상이 해소됩니다.'},
  '빈사':{name:'빈사',desc:'생과 사의 경계에 있습니다. 무의식 상태. 매 턴 시작 시 회복 판정(DC 10+빈사 수치). 빈사 수치가 4(부상이 있으면 4-부상)에 도달하면 사망. 빈사 수치가 0이 되면 의식을 되찾고 부상(wounded)을 얻습니다. 빈사 중 피해를 받으면 빈사 수치 +1(치명타면 +2).'}

// ===== CLASS FEATURE DESCRIPTIONS =====
const CLASS_FEATURE_DESC = {
  '기회 공격':'[반응] 반격 타격(Reactive Strike)\n유발 조건: 도달 범위 내 생물이 조작 행동이나 이동 행동을 사용하거나, 원거리 공격을 하거나, 이동 중 칸을 떠납니다.\n\n빈틈을 보이는 적을 신속히 공격합니다. 유발 생물에 근접 타격을 합니다. 치명타이고 유발이 조작 행동이면 행동을 방해합니다. 이 타격은 다중 공격 페널티에 포함되지 않으며, 다중 공격 페널티가 이 타격에 적용되지 않습니다.',
  '방패 막기':'[반응] 방패 막기(Shield Block)\n유발 조건: 방패를 올린 상태에서 공격으로 물리적 피해(둔기, 관통, 참격)를 받으려 합니다.\n\n방패를 제자리에 눌러 타격을 막습니다. 방패의 경도(Hardness)만큼 피해를 방지합니다. 남은 피해를 당신과 방패가 각각 받으며, 방패가 파손되거나 파괴될 수 있습니다.',
  '급소 공격 1d6':'은밀 공격(Sneak Attack): 방심(off-guard) 상태인 생물에 민첩/기교 근접 무기, 민첩/기교 비무장 공격, 원거리 무기/비무장 공격으로 타격 시 추가 1d6 정밀 피해. 투척 근접 무기는 민첩/기교여야 합니다. 5, 11, 17레벨에 피해 주사위가 1개씩 증가.',
  '급소 공격 2d6':'은밀 공격 피해가 2d6으로 증가합니다. 방심 상태인 적에게 적격 무기로 타격 시 추가 2d6 정밀 피해.',
  '급소 공격 3d6':'은밀 공격 피해가 3d6으로 증가합니다. 방심 상태인 적에게 적격 무기로 타격 시 추가 3d6 정밀 피해.',
  '기습 공격':'기습(Surprise Attack): 전투에 적보다 빨리 뛰어듭니다. 첫 라운드에 기만이나 은신으로 주도권을 굴렸으면, 아직 행동하지 않은 생물은 당신에게 방심(off-guard).',
  '라켓':'라켓을 선택합니다(깡패/사기꾼/도적). 깡패: 근력 또는 건강 기반 급소 공격, 위협 시 교란. 사기꾼: 매력 기반, 기만으로 방심 유도. 도적: 민첩 기반, 기교 근접 무기 피해에 근력 대신 민첩 수정치 적용.',
  '사냥감':'[1행동] 사냥감(Hunt Prey). 100피트 이내 대상 1명을 사냥감으로 지정. 사냥감에 대한 추적, 탐색에 보너스. 사냥감이 쓰러지거나 새 사냥감을 지정할 때까지 유지.',
  '기질':'레인저 기질을 선택합니다(사냥꾼/사격수/방랑자). 사냥꾼: 동물 동료 강화. 사격수: 원거리 정밀 사냥감 강화. 방랑자: 이동과 추적 특화.',
  '비학 주문시전':'비학 전통의 주문을 자발적으로 시전합니다. 캔트립 5개, 1등급 주문 슬롯 2개로 시작. 자발적 시전자로서 알고 있는 주문 중 아무거나 슬롯에 시전 가능.',
  '뮤즈':'뮤즈를 선택합니다(용기/다재다능/신비/매력). 용기: 용감한 작곡, 전투 지원. 다재다능: 기술과 유연성. 신비: 비전 주문 접근. 매력: 사회적 능력 강화. 뮤즈에 따라 집중 주문과 추가 캔트립/특기가 달라집니다.',
  '작곡 주문':'집중 주문 풀(1 집중점). 작곡 캔트립과 집중 주문을 시전하여 아군을 강화합니다. 작곡은 바드 고유의 집중 주문으로, 연주/노래/시를 통해 효과를 발휘합니다.',
  '신성 주문시전':'신성 전통의 주문을 준비하여 시전합니다. 매일 아침 주문을 준비하고, 준비한 주문만 시전 가능. 캔트립 5개, 1등급 주문 슬롯 2개로 시작.',
  '신성 글꼴':'날마다 추가 치유(Heal) 또는 해악(Harm) 주문을 시전할 수 있습니다. 교의에 따라 치유 글꼴(선한 신) 또는 해악 글꼴(악한 신)을 얻으며, 글꼴 슬롯 수는 1 + 매력 수정치입니다.',
  '교의':'교의를 선택합니다(은둔자/전장). 은둔자: 비무장 방어+비무장 공격 강화, 주문 중심. 전장: 갑옷+무기 숙련 강화, 전투 중심. 교의에 따라 갑옷/무기 숙련과 능력이 달라집니다.',
  '원시 주문시전':'원시 전통의 주문을 준비하여 시전합니다. 자연의 힘을 다루는 주문을 사용. 캔트립 5개, 1등급 주문 슬롯 2개로 시작.',
  '결사':'드루이드 결사를 선택합니다(동물/잎/폭풍/야생). 동물: 동물 동료+야생 변이. 잎: 식물+치유. 폭풍: 전기+바람. 야생: 야생 형태 변신. 결사에 따라 집중 주문, 훈련 기술, 금기가 달라집니다.',
  '야생 공감':'동물과 기초적인 소통이 가능합니다. 동물에 대해 외교(Diplomacy) 판정을 사용하여 태도를 변경하거나 간단한 요청을 할 수 있습니다. 자연학 판정 대신 외교 판정 사용.',
  '사역마':'사역마를 얻습니다. 사역마는 작은(Tiny) 동물로, 매일 능력 2개를 선택할 수 있습니다(감각 공유, 독 면역, 비행 등). 주인에게 추가 캔트립이나 주문 슬롯을 제공하는 주인 능력도 있습니다.',
  '후원자':'위치 후원자를 선택합니다. 후원자에 따라 주문 전통(비전/신성/비학/원시), 주술(집중 주문), 사역마 유형이 달라집니다. 후원자 종류: 운명/밤/야생/겨울/주술/용기.',
  '주술':'집중 주문의 한 형태. 후원자에 따라 다른 주술을 사용합니다. 주술 캔트립(무한 시전 가능)과 주술 주문(집중점 소비)이 있습니다.',
  '주문시전':'선택한 전통의 주문을 준비하여 시전합니다. 매일 아침 주문서에서 주문을 준비하고, 준비한 주문만 시전 가능.',
  '비전 유대':'하루 1회, 이미 시전한 준비 주문을 다시 시전할 수 있습니다. 10분 집중으로 빈 슬롯에 해당 주문을 다시 준비합니다. 이후 해당 슬롯에서 추가 시전 가능.',
  '비전 학파/논제':'비전 학파(방벽/변환/소환/예언/환기/환영/사령/변형) 또는 논제(통합/실험)를 선택합니다. 학파는 해당 학파 주문에 추가 슬롯과 교과 주문을 제공. 논제는 유연한 주문 사용 방식을 제공.',
  '비전 주문시전':'비전 전통의 주문을 준비하여 시전합니다. 주문서에서 주문을 준비합니다. 캔트립 5개, 1등급 주문 슬롯 2개로 시작.',
  '번개 반사':'반사 내성 숙련도가 전문가로 상승합니다. 반사 내성으로 피해를 줄이는 효과에서 더 좋은 결과를 얻습니다.',
  '서명 주문':'등급별로 서명 주문 1개를 지정합니다. 해당 주문은 어느 슬롯에서든 자발적으로 시전 가능(준비 없이). 자발 시전자의 유연성을 제공합니다.',
  '경보':'감지(Perception) 숙련도가 전문가로 상승합니다. 함정, 숨은 문, 숨어있는 생물을 더 잘 발견합니다.',
  '경계 감각':'감지(Perception) 숙련도가 전문가로 상승합니다. 주변 환경과 위험에 대한 인식이 향상됩니다.',
  '대평원 보폭':'비마법 험지를 무시합니다. 험지를 마치 평지처럼 이동합니다. 마법으로 생성된 험지는 여전히 영향을 줍니다.',
  '용기':'전투의 두려움을 이겨내는 훈련을 했습니다. 공포(fear) 효과에 대한 의지 내성에서 성공 시 대성공. 또한 공포 효과에 대한 의지 내성 숙련도가 전문가로 증가.',
  '파이터 무기 달인':'특정 무기 그룹에서 비할 데 없는 기술을 가지고 있습니다. 무기 그룹 하나를 선택합니다. 해당 그룹의 단순/군용 무기와 비무장 공격에 대한 숙련도가 대가(Master)로 증가. 해당 무기나 비무장 공격으로 치명타 시 치명 특성 효과를 적용합니다.',

// ===== STATE =====
const state = {
  name:'', level:1,
  ancestry:null, heritage:null,
  background:null,
  class_:null,
  ancestryFreeBoosts:[],
  altAncestryBoosts:false,
  altAncestryChoices:[],
  bgFixedBoost:null,
  bgFreeBoost:null,
  freeBoosts:[],
  trainedSkills:[],
  deity:null,
  gender:'', age:'', appearance:'',
  // Equipment
  manualGold:15,
  inventory:[],
  equippedArmor:null,
  equippedShield:null,
  // Spells
  selectedCantrips:[],
  selectedSpells:[],
  witchTradition:null,
  // Play Dashboard
  currentHP:null,
  tempHP:0,
  dying:0, wounded:0,
  conditions:{},
  actionsUsed:0,
  spellSlotsUsed:[],
  inventorySlots:{},
  notes:'',
  // XP & Level-up
  xp:0
};

const TABS = [
  {id:'ancestry',label:'혈통',shortLabel:'혈통',icon:'🧬',step:1},
  {id:'background',label:'배경',shortLabel:'배경',icon:'📜',step:2},
  {id:'class',label:'클래스',shortLabel:'클래스',icon:'⚔️',step:3},
  {id:'attrs',label:'속성',shortLabel:'속성',icon:'💪',step:4},
  {id:'skills',label:'기술',shortLabel:'기술',icon:'🎯',step:5},
  {id:'equipment',label:'장비',shortLabel:'장비',icon:'🛡️',step:6},
  {id:'spells',label:'주문',shortLabel:'주문',icon:'✨',step:7,conditional:true},
  {id:'details',label:'세부사항',shortLabel:'세부',icon:'📋',step:8},
  {id:'play',label:'플레이',shortLabel:'플레이',icon:'🎮',step:9},
];

let currentTab = 'ancestry';

// ===== CALC =====
function isSpellcaster(){
  return state.class_ && CLASSES[state.class_].caster;
}

function getVisibleTabs(){
  return TABS.filter(t => {
    if(t.conditional && t.id === 'spells') return isSpellcaster();
    return true;
  });
}

function calcAttrs(){
  const a = {str:0,dex:0,con:0,int:0,wis:0,cha:0};
  // Ancestry boosts (source: ancestry)
  if(state.ancestry){
    const anc = ANCESTRIES[state.ancestry];
    if(state.altAncestryBoosts){
      // Alternative: 2 free boosts from altAncestryChoices (no flaw)
      state.altAncestryChoices.forEach(b=>{ if(b) a[b]++ });
    } else {
      anc.boosts.forEach(b=>{
        if(b==='free'){
          state.ancestryFreeBoosts.forEach(fb=>{ if(fb) a[fb]++ });
        } else {
          a[b]++;
        }
      });
      if(anc.flaw) a[anc.flaw]--;
    }
  }
  // Background boosts (source: background)
  if(state.background !== null){
    if(state.bgFixedBoost && ATTRS.includes(state.bgFixedBoost)) a[state.bgFixedBoost]++;
    if(state.bgFreeBoost && ATTRS.includes(state.bgFreeBoost)) a[state.bgFreeBoost]++;
  }
  // Class boost (source: class)
  if(state.class_){
    const cls = CLASSES[state.class_];
    a[cls.key]++;
  }
  // Free boosts (source: 4 free, must each be different attribute)
  state.freeBoosts.forEach(b=>{ if(b) a[b]++ });
  // Cap at +4 at level 1
  ATTRS.forEach(k=>{ if(a[k]>4) a[k]=4 });
  state.attrs = a;
  return a;
}

function getMaxHP(){
  let hp = 0;
  if(state.ancestry) hp += ANCESTRIES[state.ancestry].hp;
  if(state.class_){
    // Class HP per level * level + CON per level
    const a = calcAttrs();
    hp += (CLASSES[state.class_].hp + a.con) * state.level;
  } else {
    const a = calcAttrs();
    hp += a.con;
  }
  return Math.max(hp, 1);
}

function getHP(){
  return getMaxHP();
}

function getEquippedArmorData(){
  if(state.equippedArmor !== null){
    return ARMOR_DATA[state.equippedArmor];
  }
  return null;
}

function getAC(){
  const a = calcAttrs();
  const armor = getEquippedArmorData();
  if(armor){
    const dexBonus = Math.min(a.dex, armor.dexCap);
    let ac = 10 + armor.ac + dexBonus;
    // Shield
    if(state.equippedShield !== null){
      ac += SHIELD_DATA[state.equippedShield].ac;
    }
    return ac;
  }
  return 10 + a.dex;
}

function getSpeed(){
  let speed = 25;
  if(state.ancestry) speed = ANCESTRIES[state.ancestry].speed;
  const armor = getEquippedArmorData();
  if(armor) speed += armor.speedPen;
  return Math.max(speed, 5);
}

function getProfBonus(rank){
  // T=trained(+2+level), E=expert(+4+level), M=master(+6+level), L=legendary(+8+level), U=untrained(+0)
  const lvl = state.level;
  if(rank==='T') return 2+lvl;
  if(rank==='E') return 4+lvl;
  if(rank==='M') return 6+lvl;
  if(rank==='L') return 8+lvl;
  return 0;
}

function getTotalBulk(){
  let bulk = 0;
  state.inventory.forEach(item=>{
    bulk += (item.bulk || 0) * (item.qty || 1);
  });
  return Math.round(bulk*10)/10;
}

function getRemainingGold(){
  return state.manualGold;
}

// ===== RENDER =====
function renderNav(){
  const nav = document.getElementById('nav');
  const tabs = getVisibleTabs();
  const isMobile = window.innerWidth <= 768;
  nav.innerHTML = tabs.map((t,i)=>`
    <button onclick="switchTab('${t.id}')" class="${currentTab===t.id?'active':''}">
      <span class="step">${i+1}.</span>${isMobile?`<span class="nav-icon">${t.icon}</span> ${t.shortLabel}`:` ${t.label}`}
    </button>
  `).join('');
}

function renderFooter(){
  const a = calcAttrs();
  const f = document.getElementById('footer');
  f.innerHTML = `
    ${ATTRS.map(k=>`<div class="stat-item"><span class="label">${ATTR_NAMES[k]}</span><span class="val">${a[k]>=0?'+':''}${a[k]}</span></div>`).join('')}
    <div class="stat-item"><span class="label">HP</span><span class="val">${getHP()}</span></div>
    <div class="stat-item"><span class="label">AC</span><span class="val">${getAC()}</span></div>
    <div class="stat-item"><span class="label">속도</span><span class="val">${getSpeed()}ft</span></div>
    <div class="stat-item"><span class="label">소지금</span><span class="val">${state.manualGold}gp</span></div>
    <div class="stat-item"><span class="label">XP</span><span class="val">${state.xp}/1000</span></div>
  `;
}

function switchTab(id){
  currentTab = id;
  renderNav();
  renderContent();
  renderFooter();
}

function renderContent(){
  const c = document.getElementById('content');
  switch(currentTab){
    case 'ancestry': c.innerHTML = renderAncestry(); break;
    case 'background': c.innerHTML = renderBackground(); break;
    case 'class': c.innerHTML = renderClass(); break;
    case 'attrs': c.innerHTML = renderAttrs(); break;
    case 'skills': c.innerHTML = renderSkills(); break;
    case 'equipment': c.innerHTML = renderEquipment(); break;
    case 'spells': c.innerHTML = renderSpells(); break;
    case 'details': c.innerHTML = renderDetails(); break;
    case 'play': c.innerHTML = renderPlay(); break;
  }
}

function renderAncestry(){
  let html = '<h2 class="section">1단계: 혈통 선택</h2>';
  html += '<p style="color:var(--text2);margin-bottom:10px">캐릭터의 종족을 선택하세요. 혈통은 HP, 크기, 이동 속도, 속성 부스트/결함을 결정합니다.</p>';
  html += '<div class="cards">';
  for(const[k,v] of Object.entries(ANCESTRIES)){
    const sel = state.ancestry===k;
    html += `<div class="card ${sel?'selected':''}" onclick="selectAncestry('${k}')">
      <h3>${v.name} <span class="en">${v.en}</span></h3>
      <div class="stats">
        <span class="stat">HP ${v.hp}</span>
        <span class="stat">${v.size}</span>
        <span class="stat">속도 ${v.speed}ft</span>
        <span class="stat">${v.vision}</span>
      </div>
      <div class="stats">
        ${v.boosts.map(b=>b==='free'?'<span class="stat boost">자유</span>':`<span class="stat boost">+${ATTR_NAMES[b]}</span>`).join('')}
        ${v.flaw?`<span class="stat flaw">-${ATTR_NAMES[v.flaw]}</span>`:''}
      </div>
      <div class="desc">${v.desc}</div>
    </div>`;
  }
  html += '</div>';

  if(state.ancestry){
    const anc = ANCESTRIES[state.ancestry];
    html += `<h2 class="section" style="margin-top:20px">유산 선택</h2>`;
    html += '<div class="heritage-list">';
    anc.heritages.forEach((h,i)=>{
      const sel = state.heritage===i;
      html += `<div class="heritage-item ${sel?'selected':''}" onclick="selectHeritage(${i})">
        <h4>${h.name} <span style="color:var(--text2);font-weight:normal">${h.en}</span></h4>
        <p>${h.desc}</p>
      </div>`;
    });
    html += '</div>';
  }
  return html;
}

function renderBackground(){
  let html = '<h2 class="section">2단계: 배경 선택</h2>';
  html += '<p style="color:var(--text2);margin-bottom:10px">캐릭터의 과거 경험을 선택하세요. 속성 부스트 2개, 기술 훈련 2개, 기술 특기 1개를 얻습니다.</p>';
  html += '<div class="cards">';
  BACKGROUNDS.forEach((bg,i)=>{
    const sel = state.background===i;
    html += `<div class="card ${sel?'selected':''}" onclick="selectBackground(${i})" style="padding:12px">
      <h3 style="font-size:1em">${bg.name} <span class="en">${bg.en}</span></h3>
      <div class="stats">
        <span class="stat boost">${bg.boosts[0].split('|').map(b=>ATTR_NAMES[b]||b).join(' 또는 ')}</span>
        <span class="stat boost">자유</span>
      </div>
      <div class="stats" style="margin-top:4px">
        ${bg.skills.map(s=>`<span class="stat">${s}</span>`).join('')}
      </div>
    </div>`;
  });
  html += '</div>';

  return html;
}

function renderClass(){
  let html = '<h2 class="section">3단계: 클래스 선택</h2>';
  html += '<p style="color:var(--text2);margin-bottom:10px">캐릭터의 모험 직업을 선택하세요. 클래스는 핵심 속성, HP, 주문, 특기를 결정합니다.</p>';
  html += '<div class="cards">';
  for(const[k,v] of Object.entries(CLASSES)){
    const sel = state.class_===k;
    html += `<div class="card ${sel?'selected':''}" onclick="selectClass('${k}')">
      <h3>${v.name} <span class="en">${v.en}</span></h3>
      <div class="stats">
        <span class="stat boost">핵심: ${ATTR_NAMES[v.key]}</span>
        <span class="stat">HP ${v.hp}+건강</span>
        <span class="stat">기술 ${v.skillCount}개</span>
        ${v.caster?`<span class="stat" style="color:var(--accent)">주문시전</span>`:''}
      </div>
      <div class="stats" style="margin-top:4px">
        <span class="stat">인내:${v.saves.fort}</span>
        <span class="stat">반사:${v.saves.ref}</span>
        <span class="stat">의지:${v.saves.will}</span>
        <span class="stat">감지:${v.perception}</span>
      </div>
      <div class="desc">${v.desc}</div>
    </div>`;
  }
  html += '</div>';
  return html;
}

function renderAttrs(){
  calcAttrs();
  const a = state.attrs;
  let html = '<h2 class="section">4단계: 속성 부스트 할당</h2>';
  html += '<p style="color:var(--text2);margin-bottom:15px">각 출처별로 속성 부스트를 단계적으로 배분하세요. 1레벨에서 어떤 속성도 +4를 초과할 수 없습니다.</p>';

  // === SOURCE 1: ANCESTRY BOOSTS ===
  html += '<div style="background:var(--card);padding:15px;border-radius:8px;margin-bottom:15px">';
  html += '<h3 style="color:var(--gold);margin-bottom:10px">출처 1: 혈통 부스트</h3>';
  if(state.ancestry){
    const anc = ANCESTRIES[state.ancestry];
    // Alt ancestry toggle
    html += `<div style="margin-bottom:10px"><label style="cursor:pointer;color:var(--text2);font-size:.9em">
      <input type="checkbox" ${state.altAncestryBoosts?'checked':''} onchange="toggleAltAncestry(this.checked)" style="accent-color:var(--accent);margin-right:6px">
      대안 혈통 부스트 (고정 부스트/결함 무시, 자유 부스트 2개)
    </label></div>`;

    if(state.altAncestryBoosts){
      // Alternative: 2 free boosts to different attributes
      html += `<p style="color:var(--text2);font-size:.85em;margin-bottom:8px">자유 부스트 2개를 서로 다른 속성에 배분하세요:</p>`;
      html += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
      ATTRS.forEach(k=>{
        const chosen = state.altAncestryChoices.includes(k);
        const canChoose = chosen || state.altAncestryChoices.length < 2;
        html += `<button class="boost-btn" style="margin:0;${chosen?'background:var(--green);color:#000':'background:var(--surface);color:var(--text)'}"
          ${!canChoose&&!chosen?'disabled':''} onclick="toggleAltAncestryChoice('${k}')">${ATTR_NAMES[k]}${chosen?' ✓':''}</button>`;
      });
      html += '</div>';
      html += `<p style="color:var(--green);font-size:.8em;margin-top:5px">${state.altAncestryChoices.length}/2 선택됨</p>`;
    } else {
      // Normal: show fixed boosts + flaw (read-only) + free boosts (selectable)
      const fixedBoosts = anc.boosts.filter(b=>b!=='free');
      const freeCount = anc.boosts.filter(b=>b==='free').length;
      if(fixedBoosts.length > 0){
        html += `<div style="margin-bottom:8px;font-size:.9em"><span style="color:var(--text2)">고정 부스트:</span> ${fixedBoosts.map(b=>`<span style="color:var(--green);font-weight:bold">+${ATTR_NAMES[b]}</span>`).join(', ')}</div>`;
      }
      if(anc.flaw){
        html += `<div style="margin-bottom:8px;font-size:.9em"><span style="color:var(--text2)">결함:</span> <span style="color:var(--accent);font-weight:bold">-${ATTR_NAMES[anc.flaw]}</span></div>`;
      }
      if(freeCount > 0){
        html += `<p style="color:var(--text2);font-size:.85em;margin-bottom:8px">자유 부스트 ${freeCount}개 (고정 부스트와 다른 속성):</p>`;
        html += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
        ATTRS.forEach(k=>{
          const chosen = state.ancestryFreeBoosts.includes(k);
          // Can't pick an attribute that already has a fixed boost from this ancestry
          const hasFixed = fixedBoosts.includes(k);
          // Can't duplicate within ancestry free boosts
          const canChoose = (chosen || (state.ancestryFreeBoosts.length < freeCount && !hasFixed));
          html += `<button class="boost-btn" style="margin:0;${chosen?'background:var(--green);color:#000':hasFixed?'background:#333;color:#666':'background:var(--surface);color:var(--text)'}"
            ${!canChoose&&!chosen?'disabled':''} onclick="toggleAncestryFreeBoost('${k}')">${ATTR_NAMES[k]}${chosen?' ✓':''}</button>`;
        });
        html += '</div>';
        html += `<p style="color:var(--green);font-size:.8em;margin-top:5px">${state.ancestryFreeBoosts.length}/${freeCount} 선택됨</p>`;
      }
    }
  } else {
    html += '<p style="color:var(--text2);font-size:.9em">혈통을 먼저 선택하세요.</p>';
  }
  html += '</div>';

  // === SOURCE 2: BACKGROUND BOOSTS ===
  html += '<div style="background:var(--card);padding:15px;border-radius:8px;margin-bottom:15px">';
  html += '<h3 style="color:var(--gold);margin-bottom:10px">출처 2: 배경 부스트</h3>';
  if(state.background !== null){
    const bg = BACKGROUNDS[state.background];
    // Either/or boost
    if(bg.boosts[0].includes('|')){
      const opts = bg.boosts[0].split('|').filter(b=>ATTRS.includes(b));
      html += `<p style="color:var(--text2);font-size:.85em;margin-bottom:6px">택1 부스트:</p>`;
      html += '<div style="display:flex;gap:8px;margin-bottom:10px">';
      opts.forEach(o=>{
        const selected = state.bgFixedBoost === o;
        html += `<label style="cursor:pointer;display:flex;align-items:center;gap:4px;font-size:.9em">
          <input type="radio" name="bgFixed" ${selected?'checked':''} onchange="setBgFixedBoost('${o}')" style="accent-color:var(--green)">
          <span style="color:${selected?'var(--green)':'var(--text)'};font-weight:${selected?'bold':'normal'}">${ATTR_NAMES[o]}</span>
        </label>`;
      });
      html += '</div>';
    }
    // Free boost (different from either/or choice)
    html += `<p style="color:var(--text2);font-size:.85em;margin-bottom:6px">자유 부스트 (택1 부스트와 다른 속성):</p>`;
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
    ATTRS.forEach(k=>{
      const chosen = state.bgFreeBoost === k;
      const blocked = state.bgFixedBoost === k;
      html += `<button class="boost-btn" style="margin:0;${chosen?'background:var(--green);color:#000':blocked?'background:#333;color:#666':'background:var(--surface);color:var(--text)'}"
        ${blocked&&!chosen?'disabled':''} onclick="setBgFreeBoostBtn('${k}')">${ATTR_NAMES[k]}${chosen?' ✓':''}</button>`;
    });
    html += '</div>';
  } else {
    html += '<p style="color:var(--text2);font-size:.9em">배경을 먼저 선택하세요.</p>';
  }
  html += '</div>';

  // === SOURCE 3: CLASS BOOST ===
  html += '<div style="background:var(--card);padding:15px;border-radius:8px;margin-bottom:15px">';
  html += '<h3 style="color:var(--gold);margin-bottom:10px">출처 3: 클래스 부스트</h3>';
  if(state.class_){
    const cls = CLASSES[state.class_];
    html += `<p style="font-size:.9em">클래스 핵심 속성: <span style="color:var(--green);font-weight:bold">+${ATTR_NAMES[cls.key]}</span> (자동 적용)</p>`;
  } else {
    html += '<p style="color:var(--text2);font-size:.9em">클래스를 먼저 선택하세요.</p>';
  }
  html += '</div>';

  // === SOURCE 4: FOUR FREE BOOSTS ===
  html += '<div style="background:var(--card);padding:15px;border-radius:8px;margin-bottom:15px">';
  html += '<h3 style="color:var(--gold);margin-bottom:10px">출처 4: 자유 부스트 4개</h3>';
  html += '<p style="color:var(--text2);font-size:.85em;margin-bottom:8px">4개를 서로 다른 속성에 배분하세요. 다른 출처와 중복 가능합니다.</p>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
  ATTRS.forEach(k=>{
    const chosen = state.freeBoosts.includes(k);
    const canChoose = chosen || state.freeBoosts.length < 4;
    html += `<button class="boost-btn" style="margin:0;${chosen?'background:var(--green);color:#000':'background:var(--surface);color:var(--text)'}"
      ${!canChoose&&!chosen?'disabled':''} onclick="toggleFreeBoost('${k}')">${ATTR_NAMES[k]}${chosen?' ✓':''}</button>`;
  });
  html += '</div>';
  html += `<p style="color:var(--green);font-size:.8em;margin-top:5px">${state.freeBoosts.length}/4 선택됨</p>`;
  html += '</div>';

  // === FINAL DISPLAY: Attribute totals with breakdown ===
  html += '<h3 style="color:var(--gold);margin-bottom:10px">최종 속성 합계</h3>';
  html += '<div class="attr-grid">';
  ATTRS.forEach(k=>{
    let parts = [];
    if(state.ancestry){
      const anc = ANCESTRIES[state.ancestry];
      if(state.altAncestryBoosts){
        if(state.altAncestryChoices.includes(k)) parts.push('혈통(대안)+1');
      } else {
        if(anc.boosts.includes(k) && k!=='free') parts.push('혈통+1');
        if(anc.flaw===k) parts.push('혈통-1');
        if(state.ancestryFreeBoosts.includes(k)) parts.push('혈통자유+1');
      }
    }
    if(state.bgFixedBoost===k) parts.push('배경+1');
    if(state.bgFreeBoost===k) parts.push('배경자유+1');
    if(state.class_ && CLASSES[state.class_].key===k) parts.push('클래스+1');
    if(state.freeBoosts.includes(k)) parts.push('자유+1');

    html += `<div class="attr-box">
      <div class="name">${ATTR_NAMES[k]} <span style="color:var(--text2)">${ATTR_EN[k]}</span></div>
      <div class="value" style="color:${a[k]>0?'var(--green)':a[k]<0?'var(--accent)':'var(--gold)'}">${a[k]>=0?'+':''}${a[k]}</div>
      <div class="breakdown">${parts.join(' / ') || '—'}</div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function renderSkills(){
  let html = '<h2 class="section">5단계: 기술 훈련</h2>';
  const cls = state.class_? CLASSES[state.class_] : null;
  const maxSkills = cls ? cls.skillCount : 0;
  const a = calcAttrs();
  const intBonus = Math.max(0, a.int);
  const totalSkills = maxSkills + intBonus;
  html += `<p style="color:var(--text2);margin-bottom:15px">클래스에서 ${maxSkills}개 + 지능 수정치(${intBonus})개 = 총 ${totalSkills}개 기술을 선택할 수 있습니다.</p>`;
  html += `<p style="color:var(--green);margin-bottom:15px">선택됨: ${state.trainedSkills.length}/${totalSkills}</p>`;
  html += '<div class="skill-grid">';
  SKILLS.forEach(s=>{
    const trained = state.trainedSkills.includes(s.name);
    const canCheck = trained || state.trainedSkills.length < totalSkills;
    html += `<div class="skill-item">
      <input type="checkbox" ${trained?'checked':''} ${!canCheck?'disabled':''} onchange="toggleSkill('${s.name}')">
      <span class="skill-name">${s.name}</span>
      <span class="skill-attr">${ATTR_NAMES[s.attr]}</span>
    </div>`;
  });
  html += '</div>';
  return html;
}

function renderEquipment(){
  let html = '<h2 class="section">6단계: 장비</h2>';
  html += `<div class="gold-tracker">
    <span style="color:var(--text2)">소지금 (수동 기록):</span>
    <input type="number" value="${state.manualGold}" min="0" step="0.1" style="width:80px;padding:4px 8px;text-align:center;font-size:1.1em;color:var(--gold);font-weight:bold" onchange="state.manualGold=parseFloat(this.value)||0;renderFooter()">
    <span style="color:var(--gold);font-weight:bold">gp</span>
    <span style="color:var(--text2);margin-left:10px">소지 무게:</span>
    <span style="color:var(--green);font-weight:bold">${getTotalBulk()} Bulk</span>
  </div>`;

  if(state.class_){
    const cls = CLASSES[state.class_];
    html += `<div style="background:var(--card);padding:10px 15px;border-radius:8px;margin-bottom:15px;font-size:.85em">
      <strong style="color:var(--gold)">${cls.name} 숙련:</strong>

  }

  html += '<div class="equip-section"><h3 style="font-size:1.2em;color:var(--gold);margin-bottom:10px">내 인벤토리</h3>';
  if(state.inventory.length === 0){
    html += '<p style="color:var(--text2);font-size:.9em">아직 추가한 장비가 없습니다. 아래 상점에서 장비를 추가하세요.</p>';
  } else {
    html += '<div class="inventory-list">';
    state.inventory.forEach((item,idx)=>{
      let label = item.name;
      if(item.qty > 1) label += ` x${item.qty}`;
      let extra = '';
      if(item.type==='armor' && state.equippedArmor===item.idx){
        extra = ' <span style="color:var(--green)">[장착됨]</span>';
      }
      if(item.type==='shield' && state.equippedShield===item.idx){
        extra = ' <span style="color:var(--green)">[장착됨]</span>';
      }
      html += `<div class="inv-item">
        <span>${label}${extra} <span style="color:var(--text2);font-size:.8em">(${item.price}gp, ${item.bulk} Bulk)</span></span>
        <span>
          ${item.type==='armor'?`<button class="btn" style="padding:2px 8px;font-size:.75em;background:var(--accent2)" onclick="toggleEquipArmor(${item.idx})">${state.equippedArmor===item.idx?'해제':'장착'}</button>`:
            item.type==='shield'?`<button class="btn" style="padding:2px 8px;font-size:.75em;background:var(--accent2)" onclick="toggleEquipShield(${item.idx})">${state.equippedShield===item.idx?'해제':'장착'}</button>`:''}
          <button class="sell-btn" onclick="removeInventoryItem(${idx})">제거</button>
        </span>
      </div>`;
    });
    html += '</div>';
  }
  html += '</div>';

  // === SHOP ===
  html += '<div class="equip-section"><h3 style="font-size:1.2em;color:var(--gold);margin-bottom:10px">상점</h3>';

  // Armor
  html += '<div class="equip-section"><h3>갑옷</h3>';
  html += '<table class="equip-table"><thead><tr><th>이름</th><th>종류</th><th>가격</th><th>AC</th><th>민첩 상한</th><th>판정 벌칙</th><th>속도 벌칙</th><th>무게</th><th></th></tr></thead><tbody>';
  ARMOR_DATA.forEach((arm,i)=>{
    html += `<tr title="${arm.desc||''}">
      <td>${arm.name}<br><span style="color:var(--text2);font-size:.8em">${arm.en}</span>${arm.desc?`<br><span style="color:var(--text2);font-size:.75em;font-style:italic">${arm.desc}</span>`:''}</td>
      <td>${arm.type}</td><td>${arm.price}gp</td><td>+${arm.ac}</td><td>+${arm.dexCap}</td>
      <td>${arm.checkPen||'—'}</td><td>${arm.speedPen||'—'}</td><td>${arm.bulk}</td>
      <td><button class="buy-btn" onclick="addArmor(${i})">추가</button></td>
    </tr>`;
  });
  html += '</tbody></table></div>';

  // Shields
  html += '<div class="equip-section"><h3>방패</h3>';
  html += '<table class="equip-table"><thead><tr><th>이름</th><th>가격</th><th>AC 보너스</th><th>경도</th><th>HP</th><th>무게</th><th></th></tr></thead><tbody>';
  SHIELD_DATA.forEach((sh,i)=>{
    html += `<tr title="${sh.desc||''}">
      <td>${sh.name}<br><span style="color:var(--text2);font-size:.8em">${sh.en}</span>${sh.desc?`<br><span style="color:var(--text2);font-size:.75em;font-style:italic">${sh.desc}</span>`:''}</td>
      <td>${sh.price}gp</td><td>+${sh.ac}</td><td>${sh.hardness}</td><td>${sh.hp}</td><td>${sh.bulk}</td>
      <td><button class="buy-btn" onclick="addShield(${i})">추가</button></td>
    </tr>`;
  });
  html += '</tbody></table></div>';

  // Weapons
  html += '<div class="equip-section"><h3>무기</h3>';
  html += '<table class="equip-table"><thead><tr><th>이름</th><th>분류</th><th>가격</th><th>피해</th><th>무게</th><th>손</th><th>특질</th><th></th></tr></thead><tbody>';
  WEAPON_DATA.forEach((wp,i)=>{
    html += `<tr title="${wp.desc||''}">
      <td>${wp.name}<br><span style="color:var(--text2);font-size:.8em">${wp.en}</span>${wp.desc?`<br><span style="color:var(--text2);font-size:.75em;font-style:italic">${wp.desc}</span>`:''}</td>
      <td>${wp.cat}</td><td>${wp.price}gp</td><td>${wp.dmg} ${wp.type}</td><td>${wp.bulk}</td><td>${wp.hands}</td>
      <td style="font-size:.8em">${wp.traits.join(', ')}</td>
      <td><button class="buy-btn" onclick="addWeapon(${i})">추가</button></td>
    </tr>`;
  });
  html += '</tbody></table></div>';

  // Adventuring Gear
  html += '<div class="equip-section"><h3>모험 장비</h3>';
  html += '<table class="equip-table"><thead><tr><th>이름</th><th>가격</th><th>무게</th><th>설명</th><th></th></tr></thead><tbody>';
  GEAR_DATA.forEach((g,i)=>{
    html += `<tr>
      <td>${g.name}<br><span style="color:var(--text2);font-size:.8em">${g.en}</span></td>
      <td>${g.price}gp</td><td>${g.bulk}</td><td style="color:var(--text2);font-size:.8em">${g.desc}</td>
      <td><button class="buy-btn" onclick="addGear(${i})">추가</button></td>
    </tr>`;
  });
  html += '</tbody></table></div>';

  html += '</div>'; // end shop section
  return html;
}

function renderSpells(){
  if(!isSpellcaster()){
    return '<h2 class="section">주문</h2><p style="color:var(--text2)">주문시전 클래스가 아닙니다.</p>';
  }
  const cls = CLASSES[state.class_];
  let tradition = cls.tradition;
  if(tradition === 'varies' && state.class_ === 'witch'){
    tradition = state.witchTradition || null;
  }

  let html = '<h2 class="section">7단계: 주문 선택</h2>';
  html += `<div style="background:var(--card);padding:12px 15px;border-radius:8px;margin-bottom:15px">
    <strong style="color:var(--gold)">${cls.name}</strong> —
    전통: <span style="color:var(--green)">${tradition ? TRADITION_NAMES[tradition] : '미선택'}</span> |
    시전 방식: ${cls.casting==='prepared'?'준비':'자발'} |
    캔트립: ${cls.cantripsKnown}개 |
    1등급 슬롯: ${cls.spellSlots}개
  </div>`;

  // Witch tradition choice
  if(state.class_ === 'witch'){
    html += '<div class="form-group"><label>위치 전통 선택 (후원자에 따라)</label>';
    html += '<select onchange="setWitchTradition(this.value)">';
    html += '<option value="">선택...</option>';
    ['arcane','divine','occult','primal'].forEach(t=>{
      html += `<option value="${t}" ${state.witchTradition===t?'selected':''}>${TRADITION_NAMES[t]}</option>`;
    });
    html += '</select></div>';
  }

  // Cantrips
  html += `<h3 style="color:var(--green);margin:15px 0 5px">캔트립 선택 (${state.selectedCantrips.length}/${cls.cantripsKnown})</h3>`;
  html += '<div class="spell-grid">';
  CANTRIPS.forEach(sp=>{
    if(tradition && !sp.traditions.includes(tradition)) return;
    const selected = state.selectedCantrips.includes(sp.en);
    const canSelect = selected || (state.selectedCantrips.length < cls.cantripsKnown);
    const safeEn = sp.en.replace(/'/g,"\\'");
    html += `<div class="spell-card ${selected?'selected':''}"
      onclick="${canSelect?`toggleCantrip('${safeEn}')`:''}">
      <div class="spell-name">${sp.name}</div>
      <div class="spell-info">${sp.en}</div>
      <div class="spell-info">${sp.desc}</div>
      ${sp.fullDesc?`<div class="spell-full-desc" style="display:none;margin-top:6px;padding:6px 8px;background:rgba(255,255,255,.05);border-radius:4px;font-size:.8em;color:var(--text2);line-height:1.4;border-left:2px solid var(--gold)">${sp.fullDesc}</div>`:''}
      ${sp.fullDesc?`<div style="margin-top:4px;font-size:.75em;color:var(--accent);cursor:pointer" onclick="event.stopPropagation();this.previousElementSibling.style.display=this.previousElementSibling.style.display==='none'?'block':'none';this.textContent=this.previousElementSibling.style.display==='none'?'[상세 보기]':'[접기]'">[상세 보기]</div>`:''}
    </div>`;
  });
  html += '</div>';

  // 1st rank spells
  html += `<h3 style="color:var(--green);margin:20px 0 5px">1등급 주문 선택 (${state.selectedSpells.length}/${cls.spellSlots})</h3>`;
  html += `<p style="color:var(--text2);font-size:.85em;margin-bottom:10px">${cls.casting==='prepared'?'준비 시전자: 매일 준비할 주문을 선택합니다.':'자발 시전자: 알고 있는 주문을 선택합니다.'}</p>`;
  html += '<div class="spell-grid">';
  RANK1_SPELLS.forEach(sp=>{
    if(tradition && !sp.traditions.includes(tradition)) return;
    const selected = state.selectedSpells.includes(sp.en);
    const canSelect = selected || (state.selectedSpells.length < cls.spellSlots);
    const safeEn = sp.en.replace(/'/g,"\\'");
    html += `<div class="spell-card ${selected?'selected':''}"
      onclick="${canSelect?`toggleSpell('${safeEn}')`:''}">
      <div class="spell-name">${sp.name}</div>
      <div class="spell-info">${sp.en}</div>
      <div class="spell-info">${sp.desc}</div>
      ${sp.fullDesc?`<div class="spell-full-desc" style="display:none;margin-top:6px;padding:6px 8px;background:rgba(255,255,255,.05);border-radius:4px;font-size:.8em;color:var(--text2);line-height:1.4;border-left:2px solid var(--gold)">${sp.fullDesc}</div>`:''}
      ${sp.fullDesc?`<div style="margin-top:4px;font-size:.75em;color:var(--accent);cursor:pointer" onclick="event.stopPropagation();this.previousElementSibling.style.display=this.previousElementSibling.style.display==='none'?'block':'none';this.textContent=this.previousElementSibling.style.display==='none'?'[상세 보기]':'[접기]'">[상세 보기]</div>`:''}
    </div>`;
  });
  html += '</div>';
  return html;
}

  html += `
    <div class="form-group"><label>성별</label><input type="text" value="${state.gender}" onchange="state.gender=this.value" placeholder="예: 남성, 여성, 논바이너리..."></div>

      <span style="color:var(--text2)">/1000</span>
